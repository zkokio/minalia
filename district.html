  <style>
    body { overflow-x:hidden; padding-top:92px; background:#0a0a0f; }
    body::after { display:none; }
    body::before {
      content:''; position:fixed; inset:0;
      background-image: linear-gradient(rgba(255,224,138,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(255,224,138,0.025) 1px, transparent 1px);
      background-size:64px 64px; pointer-events:none; z-index:0;
    }
    .stars, .twinkling { display:none !important; }

    /* ── HERO LAYOUT ── */
    .hero { display:grid; grid-template-columns:280px 1fr; gap:28px; margin-bottom:28px; align-items:start; }
    @media(max-width:800px) { .hero { grid-template-columns:1fr; } }
    .visual-col { display:flex; flex-direction:column; gap:12px; }
    .hex-card { background:rgba(0,0,0,0.42); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:20px; display:flex; align-items:center; justify-content:center; min-height:180px; }
    .hex-card svg { width:240px; height:auto; max-height:220px; display:block; }
    .view-on-map-btn { width:100%; text-align:center; }
    .district-nav { display:flex; align-items:center; gap:10px; margin-top:2px; }
    .district-nav-btn { color:rgba(255,224,138,0.7); text-decoration:none; font-weight:700; font-size:12px; transition:color .2s; white-space:nowrap; }
    .district-nav-btn:hover { color:#FFE08A; }
    .district-nav-btn.disabled { color:rgba(255,255,255,0.2); cursor:default; pointer-events:none; }
    .district-nav-center { flex:1; text-align:center; font-size:11px; color:rgba(255,255,255,0.3); font-weight:600; letter-spacing:.04em; }
    .unit-info { display:flex; flex-direction:column; gap:8px; }
    .unit-code-label { font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,0.35); }
    .unit-title { font-size:36px; font-weight:900; letter-spacing:-.01em; line-height:1; }
    .unit-description { font-size:13px; color:rgba(255,255,255,0.5); line-height:1.7; }
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    @media(max-width:600px) { .stats-row { grid-template-columns:repeat(2,1fr); } }

    /* ── District unit cards ── */
    @media(max-width:1100px) { .units-grid { grid-template-columns: repeat(3,1fr); } }
    @media(max-width:760px)  { .units-grid { grid-template-columns: repeat(2,1fr); } }
    .specials-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    @media(max-width:1100px) { .specials-grid { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:760px)  { .specials-grid { grid-template-columns:repeat(2,1fr); } }
    @media(max-width:480px)  { .specials-grid { grid-template-columns:1fr; } }

    .dc-card {
      background: rgba(0,0,0,0.42);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      overflow: hidden;
      display: flex; flex-direction: column;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .dc-card:hover { border-color: rgba(255,224,138,0.2); background: rgba(0,0,0,0.55); transform: translateY(-2px); }
    .dc-card.owned { border-color: rgba(255,224,138,0.15); }
    .dc-card.in-auction { border-color: rgba(255,180,80,0.25); }
    .dc-card.for-sale { border-color: rgba(96,255,171,0.2); }

    /* Gap between info panels and unit cards below */
    .bottom-grid { margin-bottom: 28px; }
    .minister-owners-row { display:grid; grid-template-columns:1fr 2fr; gap:16px; margin-bottom:16px; }
    @media(max-width:900px) { .minister-owners-row { grid-template-columns:1fr; } }
    .info-panels-row { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:20px; }
    @media(max-width:900px) { .info-panels-row { grid-template-columns:1fr; } }
    @media(max-width:1200px) { .info-panels-row { grid-template-columns:repeat(2,1fr); } }

    .dc-card-header {
      display: flex; align-items: flex-start; justify-content: space-between;
      padding: 14px 16px 10px;
      background: rgba(0,0,0,0.15);
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .dc-code { font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.95); letter-spacing: 0.04em; margin-bottom: 3px; }
    .dc-letter { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 0.03em; }
    .dc-battery { display:inline-flex; align-items:center; gap:4px; font-family:'Share Tech Mono',monospace; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:0.04em; }
    .dc-battery.bat-green  { background:rgba(74,222,128,0.12);  color:#4ade80;  border:1px solid rgba(74,222,128,0.25);  }
    .dc-battery.bat-yellow { background:rgba(255,224,138,0.12); color:#FFE08A;  border:1px solid rgba(255,224,138,0.25); }
    .dc-battery.bat-orange { background:rgba(251,146,60,0.12);  color:#fb923c;  border:1px solid rgba(251,146,60,0.25);  }
    .dc-battery.bat-red    { background:rgba(248,113,113,0.12); color:#f87171;  border:1px solid rgba(248,113,113,0.25); }
    .dc-battery.bat-none   { background:rgba(255,255,255,0.04); color:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.08); }
    .dc-pop-pill { display:inline-flex; align-items:center; gap:4px; font-family:'Share Tech Mono',monospace; font-size:10px; font-weight:700; padding:2px 7px; border-radius:4px; letter-spacing:0.04em; background:rgba(96,255,171,0.08); color:#60ffab; border:1px solid rgba(96,255,171,0.2); margin-top:4px; }

    .district-badge-col svg { width: 220px; height: 180px; border-radius: 14px; display: block; }
    /* .hex-card svg defined in hero layout block above */
    .unit-status-badge { padding: 3px 7px; border-radius: 3px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; white-space: nowrap; }
    .unit-status-badge.owned    { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.4); }
    .unit-status-badge.available { background: rgba(96,255,171,0.08); color: rgba(96,255,171,0.7); }
    .unit-status-badge.for-sale { background: rgba(96,255,171,0.12); color: rgba(96,255,171,0.9); }
    .unit-status-badge.auction  { background: rgba(255,180,80,0.12); color: rgba(255,180,80,0.9); }

    .dc-card-body { padding: 12px 16px; flex: 1; }
    .dc-price { font-size: 13px; font-weight: 700; color: rgba(96,255,171,0.9); margin-bottom: 8px; }
    .dc-price.auction { color: rgba(255,180,80,0.9); }

    .dc-owner { display: flex; align-items: center; gap: 7px; }
    .dc-owner.unowned { font-size: 11px; color: rgba(255,255,255,0.25); font-style: italic; }
    .dc-owner-avatar { width: 20px; height: 20px; border-radius: 4px; object-fit: cover; }
    .dc-owner-name { font-size: 12px; color: rgba(255,224,138,0.8); text-decoration: none; font-weight: 600; }
    .dc-owner-name:hover { color: #FFE08A; }

    .dc-dev-strip { display:flex; flex-wrap:wrap; gap:4px; padding:8px 16px 6px; border-top:1px solid rgba(255,255,255,0.04); background:rgba(0,0,0,0.08); }
    .dc-dev-icon { font-size:15px; cursor:default; line-height:1; }
    .dc-dev-icon.building { opacity:0.35; }

    /* ── Special Building Panel (district page) ── */
    .special-bldg-panel {
      grid-column: 1 / -1;
      background: rgba(255,200,80,0.04);
      border: 2px solid rgba(255,200,80,0.4);
      border-radius: 14px;
      padding: 22px 24px;
      position: relative;
      margin-bottom: 20px;
    }
    .special-bldg-panel.built {
      border-color: rgba(96,255,171,0.4);
      background: rgba(96,255,171,0.03);
    }
    .special-bldg-crown {
      position: absolute;
      top: -11px; left: 18px;
      font-size: 9px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      color: #FFE08A;
      background: rgba(12,8,20,0.98);
      padding: 2px 10px; border-radius: 4px;
      border: 1px solid rgba(255,200,80,0.35);
    }
    .special-bldg-panel.built .special-bldg-crown { color: #60ffab; border-color: rgba(96,255,171,0.35); }

    @media(max-width:640px) { .special-bldg-inner { grid-template-columns: auto 1fr; } }
    .special-bldg-icon { font-size: 44px; line-height: 1; margin-top: 4px; }

    .special-bldg-name { font-size: 18px; font-weight: 800; color: #FFE08A; }
    .special-bldg-panel.built .special-bldg-name { color: rgba(255,255,255,0.95); }
    .special-bldg-built-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase;
      color: #60ffab; background: rgba(96,255,171,0.1);
      border: 1px solid rgba(96,255,171,0.3); border-radius: 4px;
      padding: 2px 8px; width: fit-content;
    }
    .special-bldg-benefit { font-size: 13px; color: rgba(255,255,255,0.65); line-height: 1.6; }
    .special-bldg-cta { font-size: 11px; color: rgba(255,200,80,0.55); font-style: italic; }
    .special-bldg-shares {
      display: flex; flex-direction: column; gap: 8px; min-width: 180px;
    }
    @media(max-width:640px) { .special-bldg-shares { grid-column: 1 / -1; flex-direction: row; flex-wrap: wrap; } }
    .share-chip {
      display: flex; align-items: center; gap: 8px;
      background: rgba(255,200,80,0.07); border: 1px solid rgba(255,200,80,0.18);
      border-radius: 8px; padding: 8px 12px;
    }
    .share-chip-avatar { width: 26px; height: 26px; border-radius: 5px; object-fit: cover; flex-shrink: 0; }
    .share-chip-name { font-size: 12px; font-weight: 700; color: rgba(255,224,138,0.9); }
    .share-chip-unit { font-size: 10px; color: rgba(255,255,255,0.4); margin-top: 1px; }
    .share-chip-pct { margin-left: auto; font-size: 14px; font-weight: 800; color: #FFE08A; }
    .interested-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
    .interested-chip {
      font-size: 10px; font-weight: 700; padding: 3px 10px; border-radius: 10px;
      background: rgba(255,200,80,0.08); border: 1px solid rgba(255,200,80,0.2);
      color: rgba(255,200,80,0.8);
    }

    .dc-card-footer { padding: 10px 16px; background: rgba(0,0,0,0.1); border-top: 1px solid rgba(255,255,255,0.04); }
    .dc-btn {
      display: block; width: 100%; padding: 7px 0; border-radius: 5px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase;
      text-align: center; text-decoration: none; transition: background 0.15s;
    }
    .dc-btn-secondary { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.6); }
    .dc-btn-secondary:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.85); }
    .dc-btn-sale { background: rgba(96,255,171,0.1); border: 1px solid rgba(96,255,171,0.25); color: rgba(96,255,171,0.9); }
    .dc-btn-sale:hover { background: rgba(96,255,171,0.18); }
    .dc-btn-auction { background: rgba(255,180,80,0.1); border: 1px solid rgba(255,180,80,0.25); color: rgba(255,180,80,0.9); }
    .dc-btn-auction:hover { background: rgba(255,180,80,0.18); }

  // ── DISTRICT HERO SVG ──
  function buildDistrictSVG(units, tc, code, borderTerrs) {
    const W = 220, H = 180;
    const uid = code.replace('-','');

    // Parse territory colour
    const tcHex = tc.replace('#','');
    const tr = parseInt(tcHex.slice(0,2),16)||120;
    const tg = parseInt(tcHex.slice(2,4),16)||120;
    const tb = parseInt(tcHex.slice(4,6),16)||120;

    // Find bounding box of all unit q,r coords
    const qs = units.map(u=>u.q), rs = units.map(u=>u.r);
    const minQ=Math.min(...qs), maxQ=Math.max(...qs);
    const minR=Math.min(...rs), maxR=Math.max(...rs);
    const midQ=(minQ+maxQ)/2, midR=(minR+maxR)/2;

    // Scale to fit: pick hex size so cluster fits in ~160x130 area
    const spanQ = maxQ-minQ+1, spanR = maxR-minR+1;
    const HEX = Math.min(
      (W-30) / (Math.sqrt(3)*(spanQ+spanR*0.5+0.5)),
      (H-30) / (1.5*spanR+1)
    ) * 0.88;
    const cx = W/2, cy = H/2;

    function hexPts(hx,hy,hr){
      return Array.from({length:6},(_,i)=>{
        const a = Math.PI/3*i - Math.PI/6;
        return `${(hx+hr*Math.cos(a)).toFixed(1)},${(hy+hr*Math.sin(a)).toFixed(1)}`;
      }).join(' ');
    }

    function axialToPixel(q,r){
      return [
        cx + HEX*(Math.sqrt(3)*(q-midQ) + Math.sqrt(3)/2*(r-midR)),
        cy + HEX*(3/2*(r-midR))
      ];
    }

    const tierFill = {
      common:   `rgba(${tr*.4|0},${tg*.45|0},${tb*.4|0},0.70)`,
      uncommon: `rgba(${tr*.45|0},${tg*.55|0},${tb*.45|0},0.80)`,
      rare:     `rgba(${Math.min(255,tr*.3+40)|0},${tg*.3|0},${Math.min(255,tb*.5+60)|0},0.85)`,
      legendary:`rgba(${Math.min(255,tr*.5+60)|0},${Math.min(255,tg*.4+40)|0},${tb*.2|0},0.90)`,
    };
    const tierStroke = {
      common:   `rgba(${tr},${tg},${tb},0.35)`,
      uncommon: `rgba(${Math.min(255,tr+20)},${Math.min(255,tg+35)},${Math.min(255,tb+20)},0.55)`,
      rare:     `rgba(160,130,255,0.65)`,
      legendary:`rgba(255,220,80,0.80)`,
    };

    const bgD = `rgb(${tr*.06|0},${tg*.08|0},${tb*.07|0})`;
    const bgM = `rgb(${tr*.12|0},${tg*.15|0},${tb*.13|0})`;

    let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">
<defs>
  <radialGradient id="bg${uid}" cx="50%" cy="50%" r="65%">
    <stop offset="0%" stop-color="${bgM}"/>
    <stop offset="100%" stop-color="${bgD}"/>
  </radialGradient>
  <radialGradient id="gl${uid}" cx="50%" cy="50%" r="55%">
    <stop offset="0%" stop-color="${tc}" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="${tc}" stop-opacity="0"/>
  </radialGradient>
  <filter id="blur${uid}"><feGaussianBlur stdDeviation="4"/></filter>
  <clipPath id="cp${uid}"><rect width="${W}" height="${H}" rx="14"/></clipPath>
</defs>
<g clip-path="url(#cp${uid})">
<rect width="${W}" height="${H}" fill="url(#bg${uid})"/>
<circle cx="${cx}" cy="${cy}" r="70" fill="url(#gl${uid})" filter="url(#blur${uid})"/>`;

    // Draw each unit hex
    units.forEach(u => {
      const [px,py] = axialToPixel(u.q, u.r);
      const fill = tierFill[u.value_tier] || tierFill.common;
      const stroke = tierStroke[u.value_tier] || tierStroke.common;
      const sw = u.value_tier==='legendary'?2.2 : u.value_tier==='rare'?1.8 : 1.2;

      // Glow for legendary/rare
      if(u.value_tier==='legendary'||u.value_tier==='rare'){
        s += `\n<polygon points="${hexPts(px,py,HEX+3)}" fill="${tc}" opacity="0.10" filter="url(#blur${uid})"/>`;
      }
      s += `\n<polygon points="${hexPts(px,py,HEX-0.8)}" fill="${fill}"/>`;
      s += `\n<polygon points="${hexPts(px,py,HEX-0.8)}" fill="none" stroke="${stroke}" stroke-width="${sw}"/>`;

      // Isolated: tiny dashed ring
      if(u.isolated){
        s += `\n<circle cx="${px.toFixed(1)}" cy="${py.toFixed(1)}" r="${(HEX+3.5).toFixed(1)}" fill="none" stroke="rgba(255,224,138,0.22)" stroke-width="0.8" stroke-dasharray="3,3"/>`;
      }
    });

    // Border territory colour dots — small pips around the outside edge
    borderTerrs.slice(0,6).forEach((b,i) => {
      const bc = TERRITORY_COLORS[b] || '#888';
      const angle = (Math.PI*2/Math.max(borderTerrs.length,1))*i - Math.PI/2;
      const dotR = Math.min(W,H)*0.44;
      const dx = (cx + dotR*Math.cos(angle)).toFixed(1);
      const dy = (cy + dotR*Math.sin(angle)).toFixed(1);
      s += `\n<circle cx="${dx}" cy="${dy}" r="4" fill="${bc}" opacity="0.85"/>`;
      s += `\n<circle cx="${dx}" cy="${dy}" r="4" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.8"/>`;
    });

    // Coastal wave hint
    const hasCoastal = units.some(u=>u.coastal);
    if(hasCoastal){
      s += `\n<line x1="${cx-55}" y1="${H-14}" x2="${cx+55}" y2="${H-14}" stroke="rgba(0,229,255,0.14)" stroke-width="1" stroke-dasharray="4,6"/>`;
      s += `\n<line x1="${cx-35}" y1="${H-7}" x2="${cx+35}" y2="${H-7}" stroke="rgba(0,229,255,0.08)" stroke-width="1" stroke-dasharray="3,8"/>`;
    }

    s += `\n</g></svg>`;
    return s;
  }

<script>
async function confirmSpecialCollab(territoryCode, buildingSlug, costLabel, btn) {
  const sb = window.supabaseClient || window.supabase;
  const session = (() => { try { return JSON.parse(localStorage.getItem('minalia_session') || '{}'); } catch(e) { return {}; } })();
  const userId = session?.user?.id;
  if (!userId || !sb) { alert('Please log in to confirm.'); return; }

  if (!confirm(`Confirm build for ${buildingSlug.replace(/_/g,' ')} in ${territoryCode}?\n\nThis will deduct ${costLabel} from your balance. This cannot be undone.`)) return;

  btn.disabled = true;
  btn.textContent = '⏳ Confirming…';

  try {
    const { data, error } = await sb.rpc('confirm_special_collab', {
      p_player_id:      userId,
      p_territory_code: territoryCode,
      p_building_slug:  buildingSlug
    });

    if (error) throw error;

    const result = data;
    if (!result.ok) {
      btn.disabled = false;
      btn.textContent = '✦ Confirm Build — Pay ' + costLabel;
      alert('Could not confirm: ' + result.error);
      return;
    }

    if (result.started) {
      btn.style.background = 'rgba(96,255,171,0.15)';
      btn.style.borderColor = 'rgba(96,255,171,0.6)';
      btn.textContent = '🏗️ Build Started! Check your alerts.';
    } else {
      btn.style.background = 'rgba(255,200,80,0.08)';
      btn.style.borderColor = 'rgba(255,200,80,0.3)';
      btn.style.color = 'rgba(255,200,80,0.8)';
      btn.textContent = '✓ Confirmed — waiting for partner';
    }

    // Refresh the page data after a short delay
    setTimeout(() => window.location.reload(), 2000);

  } catch(e) {
    console.error('confirmSpecialCollab error:', e);
    btn.disabled = false;
    btn.textContent = '✦ Confirm Build — Pay ' + costLabel;
    alert('Error: ' + (e.message || 'Please try again.'));
  }
}
</script>
