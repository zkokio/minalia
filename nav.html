<script src="ticker.js?v=20260316a"></script>

<script>
(function () {
  var session;
  try { session = JSON.parse(localStorage.getItem('minalia_session') || '{}'); } catch(e) {}
  var userId = session && session.user && session.user.id;
  if (!userId || session.mode === 'spectator') return;

  var pill   = document.getElementById('navUserPill');
  var amtEl  = document.getElementById('navArkisAmount');

  function fmt(n) {
    n = Number(n) || 0;
    if (n >= 1000000) return (n/1000000).toFixed(1).replace(/\.0$/,'') + 'M';
    if (n >= 1000)    return (n/1000).toFixed(1).replace(/\.0$/,'') + 'K';
    return n.toLocaleString();
  }

  function setAmt(n) {
    if (!amtEl || typeof n !== 'number') return;
    amtEl.textContent = fmt(n);
    if (n < 0) {
      amtEl.style.color = '#ff4444';
      amtEl.style.textShadow = '0 0 8px rgba(255,68,68,0.8), 0 0 16px rgba(255,68,68,0.4)';
    } else {
      amtEl.style.color = '#FFE08A';
      amtEl.style.textShadow = '';
    }
    if (pill) pill.style.display = 'flex';
    try { localStorage.setItem('minalia_arkis_cache', JSON.stringify({v:n,t:Date.now()})); } catch(e) {}
  }

  // Also show pill when auth_auro sets userDropdown visible (old auth_auro compat)
  var ud = document.getElementById('userDropdown');
  if (ud) {
    var obs = new MutationObserver(function() {
      if (ud.style.display && ud.style.display !== 'none' && pill && pill.style.display === 'none') {
        pill.style.display = 'flex';
      }
    });
    obs.observe(ud, { attributes: true, attributeFilter: ['style'] });
  }

  window.refreshNavArkis = function(n) {
    if (typeof n === 'number') { setAmt(n); return; }
    if (window.playerTokens && typeof window.playerTokens.arkis === 'number') setAmt(window.playerTokens.arkis);
  };

  // 1. Show cached value instantly
  try {
    var c = JSON.parse(localStorage.getItem('minalia_arkis_cache') || 'null');
    if (c && typeof c.v === 'number' && (Date.now() - c.t) < 600000) setAmt(c.v);
  } catch(e) {}

  // 2. Poll window.playerTokens (set by most pages)
  var polls = 0;
  var pollTimer = setInterval(function() {
    if (window.playerTokens && typeof window.playerTokens.arkis === 'number') {
      clearInterval(pollTimer); setAmt(window.playerTokens.arkis); return;
    }
    if (++polls >= 20) {
      clearInterval(pollTimer);
      // 3. DB fallback after 3s gap — fires only if playerTokens never appeared
      setTimeout(function() {
        var sb = window.supabaseClient || window.supabase;
        if (!sb) return;
        sb.from('user_tokens').select('token_balance').eq('user_id', userId).single()
          .then(function(r) { if (r.data) setAmt(Number(r.data.token_balance)); })
          .catch(function() {});
      }, 3000);
    }
  }, 150);
})();
</script>
