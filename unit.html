<script>

// ── HEX MINIMAP SVG — clean map-style with hex grid ──
function generateHexSVG(unitCode, data) {
  const W=260, H=220;
  const tc = data.territory_color || '#888';
  const uid = unitCode.replace(/-/g,'');

  function seed(s){ let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(31,h)+s.charCodeAt(i))|0; return Math.abs(h); }
  function mkrng(s){ let st=s; return ()=>{ st=(st*1664525+1013904223)&0xffffffff; return (st>>>0)/0xffffffff; }; }
  const r = mkrng(seed(unitCode));
  function hx(h){ return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
  const [tr,tg,tb] = hx(tc);

  const cx=W/2, cy=H/2;
  const HEX=28; // hex radius — feels like the map

  // Pointy-top hex corners
  function hexPts(hx,hy,hr){
    return Array.from({length:6},(_,i)=>{
      const a = Math.PI/3*i - Math.PI/6;
      return `${(hx+hr*Math.cos(a)).toFixed(1)},${(hy+hr*Math.sin(a)).toFixed(1)}`;
    }).join(' ');
  }

  // Convert axial to pixel (pointy-top)
  function axialToPixel(q,rr){
    return [
      cx + HEX * (Math.sqrt(3)*q + Math.sqrt(3)/2*rr) * 0.72,
      cy + HEX * (3/2*rr) * 0.72
    ];
  }

  // Draw 7 surrounding hexes + 1 centre = a mini territory cluster
  // Centre = this unit. Surround with faded territory colour.
  const neighbours = [[1,0],[-1,0],[0,1],[0,-1],[1,-1],[-1,1]];

  let bgD=`rgb(${tr*.07|0},${tg*.09|0},${tb*.08|0})`;
  let bgM=`rgb(${tr*.13|0},${tg*.16|0},${tb*.14|0})`;

  let s = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">
<defs>
  <radialGradient id="bg${uid}" cx="50%" cy="50%" r="60%">
    <stop offset="0%" stop-color="${bgM}"/>
    <stop offset="100%" stop-color="${bgD}"/>
  </radialGradient>
  <radialGradient id="gl${uid}" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="${tc}" stop-opacity="0.22"/>
    <stop offset="100%" stop-color="${tc}" stop-opacity="0"/>
  </radialGradient>
  <filter id="blur${uid}"><feGaussianBlur stdDeviation="3"/></filter>
  <clipPath id="cp${uid}"><rect width="${W}" height="${H}" rx="14"/></clipPath>
</defs>
<g clip-path="url(#cp${uid})">
<rect width="${W}" height="${H}" fill="url(#bg${uid})"/>

<!-- soft glow bloom behind centre -->
<circle cx="${cx}" cy="${cy}" r="55" fill="url(#gl${uid})" filter="url(#blur${uid})"/>`;

  // Neighbour hexes — territory context, faded
  neighbours.forEach(([dq,drr]) => {
    const [px,py] = axialToPixel(dq,drr);
    const op = (0.12 + r()*0.1).toFixed(2);
    s += `\n<polygon points="${hexPts(px,py,HEX-1)}" fill="${tc}" opacity="${op}"/>`;
    s += `\n<polygon points="${hexPts(px,py,HEX-1)}" fill="none" stroke="${tc}" stroke-width="0.6" opacity="0.25"/>`;
  });

  // Feature: border territory arcs — coloured dots on edges for bordering territories
  if(data.borders && data.borders.length > 0){
    data.borders.slice(0,3).forEach((b,i) => {
      const bc = TERRITORY_COLORS[b] || '#888';
      const a = (Math.PI/3)*i + Math.PI/6;
      const bx = cx + (HEX+12)*Math.cos(a), by = cy + (HEX+12)*Math.sin(a);
      s += `\n<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="4" fill="${bc}" opacity="0.85"/>`;
      s += `\n<circle cx="${bx.toFixed(1)}" cy="${by.toFixed(1)}" r="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>`;
    });
  }

  // Centre hex — THIS unit, full brightness
  // Fill varies by tier
  const tierFill = {
    common:   `rgba(${tr*.4|0},${tg*.45|0},${tb*.4|0},0.75)`,
    uncommon: `rgba(${tr*.45|0},${tg*.55|0},${tb*.45|0},0.8)`,
    rare:     `rgba(${Math.min(255,tr*.3+40)|0},${tg*.3|0},${Math.min(255,tb*.5+60)|0},0.8)`,
    legendary:`rgba(${Math.min(255,tr*.5+60)|0},${Math.min(255,tg*.4+40)|0},${tb*.2|0},0.82)`,
  };
  s += `\n<!-- centre hex glow -->`;
  s += `\n<polygon points="${hexPts(cx,cy,HEX+6)}" fill="${tc}" opacity="0.12" filter="url(#blur${uid})"/>`;
  s += `\n<polygon points="${hexPts(cx,cy,HEX)}" fill="${tierFill[data.value_tier]||tierFill.common}"/>`;

  // Tier-specific centre border
  const tierStroke = { common:`rgba(${tr},${tg},${tb},0.45)`, uncommon:`rgba(${Math.min(255,tr+20)},${Math.min(255,tg+35)},${Math.min(255,tb+20)},0.6)`, rare:`rgba(160,130,255,0.7)`, legendary:`rgba(255,220,80,0.85)` };
  const tierSW = { common:1.5, uncommon:2, rare:2.5, legendary:3 };
  s += `\n<polygon points="${hexPts(cx,cy,HEX)}" fill="none" stroke="${tierStroke[data.value_tier]}" stroke-width="${tierSW[data.value_tier]}"/>`;

  // Inner ring for rare/legendary
  if(data.value_tier==='legendary'||data.value_tier==='rare'){
    s += `\n<polygon points="${hexPts(cx,cy,HEX-6)}" fill="none" stroke="${tierStroke[data.value_tier]}" stroke-width="0.7" opacity="0.4"/>`;
  }

  // Legendary corner runes
  if(data.value_tier==='legendary'){
    for(let i=0;i<6;i++){
      const a=Math.PI/3*i;
      s+=`\n<circle cx="${(cx+Math.cos(a)*(HEX+18)).toFixed(1)}" cy="${(cy+Math.sin(a)*(HEX+18)).toFixed(1)}" r="2.2" fill="rgba(255,210,80,0.6)"/>`;
    }
  }

  // Isolated: dashed orbit
  if(data.isolated){
    s += `\n<circle cx="${cx}" cy="${cy}" r="${HEX+22}" fill="none" stroke="rgba(255,224,138,0.15)" stroke-width="1" stroke-dasharray="5,4"/>`;
  }

  // Coastal: wave hint at bottom
  if(data.coastal){
    s += `\n<line x1="${cx-60}" y1="${H-18}" x2="${cx+60}" y2="${H-18}" stroke="rgba(0,229,255,0.18)" stroke-width="1" stroke-dasharray="4,6"/>`;
    s += `\n<line x1="${cx-40}" y1="${H-10}" x2="${cx+40}" y2="${H-10}" stroke="rgba(0,229,255,0.1)" stroke-width="1" stroke-dasharray="3,8"/>`;
  }

        slots.push(
          `<div class="unit-dev-slot filled${isBuilding ? ' building' : ''}" ` +
          `style="background:${col}${isBuilding ? '66' : ''};" ` +
          `title="${icon} ${name}${isBuilding ? ' (Under Construction…)' : ' (Fully Operational)'}" ` +
          `onclick="showDevSlotPopup(event,${i})"></div>`
        );
      } else {
        slots.push(`<div class="unit-dev-slot empty" title="Empty slot — click to view developments" onclick="scrollToDevPanel()"></div>`);
      }
    }

    // Star
    const collabRows = window._unitCollabRows || [];
    const hasActiveCollab = collabRows.some(c => c.status === 'completed' || c.status === 'building' || c.status === 'interested');
    const specialBldgName = TERRITORY_SPECIAL_UNIT[territory]?.name || 'Territory Special Building';
    const starTitle = hasActiveCollab
      ? `⭐ Collaboration active: ${specialBldgName} — click to view district`
      : `Joint Collaboration Participant — click to view ${territory} district`;
    const starClass = hasActiveCollab ? 'star-gold' : 'star-empty';
    const starHtml = `<a href="district.html?code=${territory}" class="unit-dev-star ${starClass}" title="${starTitle}">★</a>`;

    // Legend for filled categories
    const usedCats = [...new Set(devs.filter(d => d.development_catalog?.category).map(d => d.development_catalog.category))];
    const legendHtml = usedCats.length
      ? `<div class="dev-slots-legend">${usedCats.map(cat =>
          `<div class="dev-legend-item"><div class="dev-legend-dot" style="background:${DEV_CAT_COLORS[cat]}"></div>${DEV_CAT_LABELS[cat]}</div>`
        ).join('')}</div>`
      : '';

    return `
      <div class="unit-dev-slots-bar" title="${devs.length}/10 development slots used">
        ${slots.join('')}
        <span class="unit-dev-slots-count">${devs.length}/10</span>
        ${starHtml}
      </div>
      ${legendHtml}`;
  }

  // Build the developments panel HTML
  // ── Tune yield multiplier based on owner's last_login_at ──────────────────
  function tuneYieldMultiplier(lastLoginAt) {
    if (!lastLoginAt) return { mult: 1.0, label: null, pct: 100 };
    const days = (Date.now() - new Date(lastLoginAt).getTime()) / 86400000;
    if (days >= 30) return { mult: 0.0, label: 'SUSPENDED',  pct: 0,   col: '#f87171' };
    if (days >= 21) return { mult: 0.5, label: '50% YIELD',  pct: 50,  col: '#f87171' };
    if (days >= 14) return { mult: 0.75,label: '75% YIELD',  pct: 75,  col: '#fb923c' };
    if (days >= 7)  return { mult: 0.9, label: '90% YIELD',  pct: 90,  col: '#FFE08A' };
    return { mult: 1.0, label: null, pct: 100, col: '#4ade80' };
  }

  function buildUnitDevPanel(devs, lastLoginAt) {
    if (!devs.length) {
      return `<div class="unit-dev-empty">No developments on this unit yet.</div>`;
    }

    const { mult, label, pct, col } = tuneYieldMultiplier(lastLoginAt);
    const yieldBannerHtml = label ? `
      <div style="margin-bottom:12px;padding:8px 12px;border-radius:8px;background:rgba(255,255,255,0.03);border:1px solid ${col}33;display:flex;align-items:center;justify-content:space-between;gap:8px;">
        <div style="font-size:11px;font-family:'Share Tech Mono',monospace;color:rgba(255,255,255,0.45);">⚡ Tune power affects all development yields</div>
        <span style="font-size:11px;font-weight:700;font-family:'Share Tech Mono',monospace;color:${col};padding:2px 8px;border-radius:20px;background:${col}18;border:1px solid ${col}44;">${label}</span>
      </div>` : '';

    return `<div class="unit-dev-grid">${yieldBannerHtml}${devs.map(dev => {
      const cat   = dev.development_catalog?.category || 'housing';
      const col   = DEV_CAT_COLORS[cat] || '#fff';
      const name  = dev.development_catalog?.name || 'Development';
      const icon  = dev.development_catalog?.icon || '🏗️';
      const desc  = dev.development_catalog?.description || '';
      const isBuilding = dev.status === 'building';
      const statusLabel = isBuilding ? 'Under Construction' : 'Fully Operational';
      const statusClass = isBuilding ? 'building' : 'completed';
      const dotClass    = isBuilding ? 'building' : 'completed';
      // Build income display from catalog yields + monthly_income — apply tune multiplier
      const dc = dev.development_catalog || {};
      const incomeLines = [];
      const applyMult = (n) => Math.round(Number(n) * mult);
      if (dev.monthly_income > 0)     incomeLines.push(`<span style="color:#60ffab;">${applyMult(dev.monthly_income).toLocaleString()} ARKIS</span>`);
      else if (dc.yield_arkis > 0)    incomeLines.push(`<span style="color:#60ffab;">${applyMult(dc.yield_arkis).toLocaleString()} ARKIS</span>`);
      if (dc.yield_wire > 0)          incomeLines.push(`<span style="color:#a0d8ff;">${applyMult(dc.yield_wire).toLocaleString()} WIRE</span>`);
      if (dc.yield_plasm > 0)         incomeLines.push(`<span style="color:#c8a0ff;">${applyMult(dc.yield_plasm).toLocaleString()} PLASM</span>`);
      if (dc.yield_lichen > 0)        incomeLines.push(`<span style="color:#80e0a0;">${applyMult(dc.yield_lichen).toLocaleString()} LICHEN</span>`);
      if (dc.yield_spore > 0)         incomeLines.push(`<span style="color:#f0c060;">${applyMult(dc.yield_spore).toLocaleString()} SPORE</span>`);
      const incomeHtml = incomeLines.length
        ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06);">
             <div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.3);margin-bottom:4px;font-weight:700;">Monthly Income</div>
             <div style="display:flex;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:700;">${incomeLines.join('')}</div>
           </div>`
        : '';

      const slug     = dev.development_catalog?.slug || dev.building_type || '';
      const isSpecial = dev.development_catalog?.is_special_collab || false;
      const devLink  = slug ? `dev.html?slug=${slug}` : 'dev.html';

      // Level badge
      const LEVEL_NAMES  = ['','Standard','Enhanced','Advanced','Superior','Ultimate'];
      const LEVEL_COLORS = ['','rgba(255,255,255,0.4)','rgba(34,197,94,0.8)','rgba(59,130,246,0.8)','rgba(168,85,247,0.8)','rgba(255,200,60,0.9)'];
      const lvl      = dev.level || 1;
      const lvlName  = LEVEL_NAMES[lvl]  || 'Standard';
      const lvlColor = LEVEL_COLORS[lvl] || LEVEL_COLORS[1];

      // Construction countdown for building-status devs
      let constructionHtml = '';
      if (isBuilding && dev.completed_at) {
        const completedAt = new Date(dev.completed_at);
        const msLeft = completedAt - Date.now();
        const timerClass = `dev-build-timer-${dev.id?.replace(/-/g,'') || Math.random().toString(36).slice(2)}`;
        if (msLeft > 0) {
          const lumDur  = typeof realMsToLumDuration === 'function' ? realMsToLumDuration(msLeft) : '';
          const irlHrs  = Math.max(0, (msLeft / 3600000)).toFixed(1);
          const irlStr  = msLeft < 3600000
            ? `${Math.ceil(msLeft/60000)} IRL min`
            : `${irlHrs} IRL hrs`;
          constructionHtml = `
            <div class="${timerClass}" style="margin-top:8px;padding:8px 10px;background:rgba(255,200,60,0.06);border:1px solid rgba(255,200,60,0.15);border-radius:8px;">
              <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,200,60,0.5);margin-bottom:4px;">⏳ Under Construction</div>
              <div style="font-size:13px;font-weight:700;color:rgba(255,200,60,0.9);" data-completedat="${completedAt.toISOString()}">
                ${lumDur} <span style="font-size:10px;color:rgba(255,255,255,0.3);font-weight:400;">(${irlStr})</span>
              </div>
              <div style="font-size:10px;color:rgba(255,255,255,0.25);margin-top:2px;">Ready: ${completedAt.toLocaleString(undefined,{dateStyle:'short',timeStyle:'short'})}</div>
            </div>`;
        } else {
          // Build time elapsed — DB cron hasn't updated yet. Re-render once after 3s, then stop.
          if (!window._reRenderScheduled) {
            window._reRenderScheduled = true;
            setTimeout(() => { window._reRenderScheduled = false; render(); }, 3000);
          }
          constructionHtml = `
            <div style="margin-top:8px;padding:8px 10px;background:rgba(96,255,171,0.06);border:1px solid rgba(96,255,171,0.2);border-radius:8px;font-size:12px;color:rgba(96,255,171,0.9);font-weight:600;">
              ✓ Build complete — refreshing…
            </div>`;
        }
      }

      return `
        <div class="unit-dev-card status-${statusClass}">
          <div style="display:flex;align-items:flex-start;gap:10px;">
            <span class="unit-dev-card-icon">${icon}</span>
            <div style="flex:1;min-width:0;">
              <a href="${devLink}" class="unit-dev-card-name" style="text-decoration:none;color:inherit;transition:color .15s;" onmouseover="this.style.color='rgba(255,224,138,0.9)'" onmouseout="this.style.color=''">${name} ↗</a>
              <div style="display:flex;align-items:center;gap:6px;margin-top:2px;">
                <div class="unit-dev-card-cat" style="color:${col}">${DEV_CAT_LABELS[cat] || cat}</div>
                ${!isBuilding ? `<span style="font-size:9px;font-weight:700;color:${lvlColor};letter-spacing:.05em;padding:1px 5px;border:1px solid ${lvlColor};border-radius:4px;opacity:0.85;">${lvlName}</span>` : ''}
              </div>
            </div>
          </div>
          ${desc ? `<div style="font-size:11px;color:rgba(255,255,255,0.45);line-height:1.5;">${desc}</div>` : ''}
          ${constructionHtml}
          ${incomeHtml}
          <div class="unit-dev-status-badge ${statusClass}">
            <span class="status-dot ${dotClass}"></span>
            ${isBuilding ? 'Building in progress' : statusLabel}
          </div>
        </div>`;
    }).join('')}</div>`;
  }

  // Fetch special building collab for this unit's territory
  let specialCollabHtml = '';
  const specialBldg = TERRITORY_SPECIAL_UNIT[d.territory];
  if (specialBldg && window.supabase && typeof window.supabase.from === 'function') {
    try {
      const { data: collabRows } = await window.supabase
        .from('special_building_collaborations')
        .select('player_id, unit_code, status, share_pct')
        .eq('territory_code', d.territory)
        .eq('building_slug', specialBldg.slug);

      if (collabRows && collabRows.length) {
        window._unitCollabRows = collabRows;
        const builtCollabs = collabRows.filter(c => c.status === 'completed');
        const interestedCollabs = collabRows.filter(c => c.status === 'interested');
        const myCollab = collabRows.find(c => c.unit_code === code);

        if (builtCollabs.length > 0) {
          const myShare = myCollab && myCollab.status === 'completed' ? parseFloat(myCollab.share_pct || 0) : null;
          const pctStr = myShare != null ? (myShare % 1 === 0 ? myShare : myShare.toFixed(2)) + '%' : null;
          specialCollabHtml = `
            <div class="section" style="border-color:rgba(96,255,171,0.35);background:rgba(96,255,171,0.02);">
              <div class="section-heading" style="color:#60ffab;">${specialBldg.icon} Territory Special Building</div>
              <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;">
                <span style="font-size:16px;font-weight:800;color:rgba(255,255,255,0.95);">${specialBldg.name}</span>
                <span style="font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:0.08em;color:#60ffab;background:rgba(96,255,171,0.1);border:1px solid rgba(96,255,171,0.3);border-radius:4px;padding:2px 7px;">✓ Built</span>
              </div>
              <div style="font-size:12px;color:rgba(255,255,255,0.55);line-height:1.6;margin-bottom:12px;">${specialBldg.benefit}</div>
              ${pctStr ? `<div style="font-size:20px;font-weight:800;color:#FFE08A;">${pctStr} <span style="font-size:12px;color:rgba(255,255,255,0.4);font-weight:400">share on this unit</span></div>` : `<div style="font-size:12px;color:rgba(255,255,255,0.35);font-style:italic;">Built by ${builtCollabs.length} player${builtCollabs.length !== 1 ? 's' : ''} — this unit has no share.</div>`}
            </div>`;
        } else if (interestedCollabs.length > 0 || myCollab) {
          const myIn = !!myCollab && myCollab.status === 'interested';
          specialCollabHtml = `
            <div class="section" style="border-color:rgba(255,200,80,0.3);background:rgba(255,200,80,0.02);">
              <div class="section-heading">${specialBldg.icon} Territory Special Building</div>
              <div style="font-size:15px;font-weight:800;color:#FFE08A;margin-bottom:6px;">${specialBldg.name}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.5);line-height:1.5;margin-bottom:10px;">${specialBldg.benefit}</div>
              <div style="font-size:12px;color:rgba(255,200,80,0.8);">
                ${myIn ? '✦ You are open to collaboration on this building.' : `${interestedCollabs.length} player${interestedCollabs.length !== 1 ? 's' : ''} interested — need 2+ to build.`}
              </div>
            </div>`;
        }
      }
    } catch(e) { console.warn('Special collab fetch for unit:', e); }
  }
  const min = MINISTERS[d.territory];
  // ministerHtml is the minister half of the combined owner+minister row
  let ministerBlock='';
  if(min){
    ministerBlock=`
      <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;">
        <a href="${min.page}" style="display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;text-align:center;">
          <img src="${min.img}" alt="${min.name}"
            style="width:52px;height:auto;display:block;border-radius:0;object-fit:contain;flex-shrink:0;"
            onerror="this.style.display='none'">
          <div>
            <div class="owner-name" style="font-size:12px;text-align:center;">${min.name}</div>
            <div class="owner-sub" style="text-align:center;">Territory Minister</div>
            <div class="owner-sub" style="margin-top:3px;color:rgba(96,200,255,0.6);text-align:center;">View profile →</div>
          </div>
        </a>
      </div>`;
  }

  // ── ADJACENT TERRITORIES ──
  let bordersHtml='';
  if(d.borders?.length>0){
    bordersHtml=d.borders.map(b=>{
      const bc=TERRITORY_COLORS[b]||'#888',bn=TERRITORY_NAMES[b]||b;
      return`<a class="border-item" href="map.html?territory=${b}"><div class="border-swatch" style="background:${bc}"></div><span class="border-tname">${bn}</span><span class="border-tcode">${b}</span></a>`;
    }).join('');
  } else {
    bordersHtml=`<p class="no-borders">No adjacent territories — deep within ${TERRITORY_NAMES[d.territory]}.</p>`;
  }

  // ── ATTRIBUTE PILLS ──
  const pillDefs=[
    {label:'Coastal',           active:d.coastal},
    {label:'Isolated Outpost',  active:d.isolated},
    {label:'Dual Border',       active:d.dual_border},
    {label:'Border Unit',       active:d.border_count===1},
    {label:'Deep Inland',       active:!d.coastal&&d.border_count===0&&!d.isolated},
    {label:'Peninsula',         active:d.is_tip},
    {label:'Corridor Territory',active:d.territory==='LUM-19'},
  ];
  const pillsHtml=pillDefs.map(p=>`<span class="attr-pill${p.active?' active':''}">${p.label}</span>`).join('');

  const qStr=`${d.q>=0?'+':''}${d.q}`, rStr=`${d.r>=0?'+':''}${d.r}`;

  // ── PREV / NEXT UNIT NAV ──
  const allUnitKeys = Object.keys(UNIT_DATA);
  const unitIdx = allUnitKeys.indexOf(code);
  const prevCode = unitIdx > 0 ? allUnitKeys[unitIdx - 1] : null;
  const nextCode = unitIdx < allUnitKeys.length - 1 ? allUnitKeys[unitIdx + 1] : null;

  page.innerHTML=`
    <div class="breadcrumb">
      <a href="map.html">Map</a><span class="sep">›</span>
      <a href="district.html?code=${d.territory}" style="color:${tc}">${TERRITORY_NAMES[d.territory]}</a><span class="sep">›</span>
      <span class="current">${code}</span>
    </div>

    <div class="hero">
      <div class="visual-col">
        <div class="hex-card">${generateHexSVG(code,d)}</div>
        <div id="tuneBatteryDisplay" class="tune-battery-unit" style="display:${dbUnit && dbUnit.tune_score!=null ? 'flex' : 'none'}">
          <div class="tune-battery-bar"><div class="tune-battery-fill" id="tuneBatFill" style="width:${dbUnit && dbUnit.tune_score!=null ? dbUnit.tune_score : 0}%"></div></div>
          <div class="tune-battery-meta"><span>⚡ TUNE POWER</span><span id="tuneBatLabel"></span></div>
        </div>
        <div id="tuneStatus" class="tune-status-hero"></div>
        <div class="unit-nav">
          ${prevCode ? '<a href="unit.html?code='+prevCode+'" class="unit-nav-btn">← '+prevCode+'</a>' : '<span class="unit-nav-btn disabled">← First</span>'}
          <span class="unit-nav-center">${unitIdx+1} / ${allUnitKeys.length}</span>
          ${nextCode ? '<a href="unit.html?code='+nextCode+'" class="unit-nav-btn">'+nextCode+' →</a>' : '<span class="unit-nav-btn disabled">Last →</span>'}
        </div>
        <a href="map.html" class="btn btn-primary view-on-map-btn">← Map</a>
        <a href="district.html?code=${d.territory}" class="btn btn-secondary view-on-map-btn" style="margin-top:0;text-align:center;">View District</a>
      </div>

      <div class="unit-info">
        <div class="unit-info-header">
          <div class="unit-code-label">${d.territory} · Unit ${code.split('-')[2]}</div>
          <h1 class="unit-title">${code}</h1>
          <a class="territory-row" href="district.html?code=${d.territory}" style="text-decoration:none;cursor:pointer;">
            <div class="territory-dot" style="background:${tc};box-shadow:0 0 8px ${tc}55"></div>
            <span class="territory-name-text" style="color:${tc}">${TERRITORY_NAMES[d.territory]}</span>
            <span class="territory-code-text">&nbsp;${d.territory}</span>
          </a>
          <div class="unit-tier-badge ${d.value_tier}">${tierLabel}</div>
          <p class="unit-description">${d.description}</p>
        </div>
        <div class="attr-row">${pillsHtml}</div>
        <div class="stats-row">
          <div class="stat-item"><div class="stat-label">Value Score</div><div class="stat-value" style="color:#FFE08A">${d.value_score}<span style="font-size:11px;color:rgba(255,255,255,0.2);font-weight:400">/10</span></div></div>
          <div class="stat-item"><div class="stat-label">Population</div><div class="stat-value" style="color:#60ffab" id="unit-pop-stat">${dbUnit && dbUnit.population!=null ? dbUnit.population.toLocaleString() : '—'}</div></div>
          <div class="stat-item"><div class="stat-label">Area</div><div class="stat-value">~16<span style="font-size:11px;color:rgba(255,255,255,0.2);font-weight:400"> km²</span></div></div>
          <div class="stat-item"><div class="stat-label">Borders</div><div class="stat-value">${d.border_count}<span style="font-size:11px;color:rgba(255,255,255,0.2);font-weight:400"> terr.</span></div></div>
        </div>
        <div class="unit-dev-slots-wrap">${buildUnitDevSlots(unitDevs, d.territory)}</div>
      </div>
    </div>

    <div class="bottom-grid">
      <div class="bottom-left">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
          <div class="section">
            <div class="section-heading">Owner${min ? ' · Territory Minister' : ''}</div>
            <div class="section-body" style="display:flex;gap:12px;align-items:flex-start;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:6px;flex:1;min-width:0;">
                <a href="${owner ? owner.profileUrl : '#'}" style="display:flex;flex-direction:column;align-items:center;gap:6px;text-decoration:none;text-align:center;">
                  ${owner && owner.avatar
                    ? `<img src="${owner.avatar}" alt="" style="width:52px;height:52px;display:block;border-radius:4px;object-fit:cover;flex-shrink:0;" onerror="this.outerHTML='<div style=\'width:52px;height:52px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#FFE08A;\'>${(owner.username||'?')[0].toUpperCase()}</div>'">`
                    : `<div style="width:52px;height:52px;border-radius:4px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#FFE08A;">${owner ? (owner.username||'?')[0].toUpperCase() : '?'}</div>`
                  }
                  <div>
                    <div class="owner-name" style="font-size:12px;text-align:center;">${owner ? owner.username : '—'}</div>
                    <div class="owner-sub" style="text-align:center;">Owner</div>
                  </div>
                </a>
              </div>
              ${min ? `<div style="width:1px;background:rgba(255,255,255,0.06);align-self:stretch;flex-shrink:0;"></div>` : ''}
              ${ministerBlock}
            </div>
          </div>
          <div class="section"><div class="section-heading">Market</div><div class="section-body">${marketHtml}</div></div>
        </div>
        ${specialCollabHtml}
        <div class="section" id="devPanel" style="scroll-margin-top:110px;">
          <div class="section-heading">Developments</div>
          <div class="section-body">${buildUnitDevPanel(unitDevs, ownerLastLoginAt)}</div>
        </div>
      </div>
      <div class="bottom-right">
        <div class="section"><div class="section-heading">Adjacent Territories</div><div class="section-body"><div class="border-list">${bordersHtml}</div></div></div>
        <div class="section"><div class="section-heading">Land Details</div><div class="section-body">
          <div class="detail-row"><span class="detail-key">Location</span><span class="detail-value">${d.location_type.replace(/\+/g,' · ')}</span></div>
          <div class="detail-row"><span class="detail-key">Territory</span><span class="detail-value gold">${TERRITORY_NAMES[d.territory]}</span></div>
          <div class="detail-row"><span class="detail-key">Population</span><span class="detail-value" style="color:#60ffab">${dbUnit && dbUnit.population!=null ? dbUnit.population.toLocaleString() : '—'}</span></div>
          <div class="detail-row"><span class="detail-key">Pop. at Founding</span><span class="detail-value">${dbUnit && dbUnit.population_base!=null ? dbUnit.population_base.toLocaleString() : '—'}</span></div>
          <div class="detail-row"><span class="detail-key">Biome</span><span class="detail-value">Ancient Forest</span></div>
          <div class="detail-row"><span class="detail-key">World</span><span class="detail-value">Luminaea</span></div>
          <div class="detail-row"><span class="detail-key">Coords</span><span class="detail-value">${qStr}, ${rStr}</span></div>
        </div></div>
      </div>
    </div>
    ${_isOwner ? '<div class="section build-catalog-panel" id="buildCatalogPanel" style="margin-top:16px;"><div class="section-heading">Build a Development</div><div class="section-body" id="buildCatalogInner"><div style="color:rgba(255,255,255,0.25);font-size:12px;padding:8px 0;">Loading catalog…</div></div></div>' : ''}
    </div>`;

// ── BUILD CATALOG ─────────────────────────────────────────────────────
async function loadBuildCatalog(unitCode) {
  const inner = document.getElementById('buildCatalogInner');
  if (!inner) return;
  const sb = window.supabase || window.supabaseClient;
  if (!sb) return;
  const session = (() => { try { return JSON.parse(localStorage.getItem('minalia_session') || '{}'); } catch(e) { return {}; } })();
  const userId = session?.user?.id;
  if (!userId) return;

  try {
    const [catRes, existRes, tokRes] = await Promise.all([
      sb.from('development_catalog')
        .select('id,slug,name,icon,category,description,cost_arkis,build_time_days,yield_arkis,yield_plasm,yield_wire,yield_lichen,yield_spore,instant_build,require_coastal,tier')
        .eq('active', true)
        .not('tier', 'eq', 'legendary')
        .order('sort_order', { ascending: true, nullsFirst: false }),
      sb.from('developments')
        .select('building_type, status')
        .eq('unit_code', unitCode)
        .in('status', ['building', 'completed']),
      sb.from('user_tokens').select('token_balance').eq('user_id', userId).single(),
    ]);

    const catalog  = catRes.data || [];
    const existing = existRes.data || [];
    const balance  = Number(tokRes.data?.token_balance || 0);
    const builtSlugs    = new Set(existing.filter(d => d.status === 'completed').map(d => d.building_type));
    const buildingSlugs = new Set(existing.filter(d => d.status === 'building').map(d => d.building_type));

    const cats = ['all', ...new Set(catalog.map(d => d.category).filter(Boolean))];
    const catLabels = { all:'All', culture:'🎭 Culture', defence:'🛡️ Defence', economy:'💰 Economy', health:'💊 Health', housing:'🏠 Housing', nature:'🌿 Nature', prestige:'✦ Prestige', science:'🔬 Science' };

    function renderCards(cat) {
      const isCoastal = !!(window._dbUnit?.coastal);
      const filtered = (cat === 'all' ? catalog : catalog.filter(d => d.category === cat))
        .filter(dev => !dev.require_coastal || isCoastal); // hide coastal-only buildings from inland units
      return filtered.map(dev => {
        const cost      = Number(dev.cost_arkis) || 0;
        const isBuilt   = builtSlugs.has(dev.slug);
        const isBuilding = buildingSlugs.has(dev.slug);
        const canAfford = balance >= cost;
        const cardClass = 'build-card' + ((!canAfford && !isBuilt && !isBuilding) ? ' unaffordable' : '');
        let btnClass = 'build-card-btn';
        let btnText  = 'Build · ' + cost.toLocaleString() + ' ARKIS';
        let btnDisabled = '';
        if (isBuilt)     { btnClass += ' already-built'; btnText = '✅ Already Built'; btnDisabled = 'disabled'; }
        else if (isBuilding) { btnClass += ' building'; btnText = '⏳ Building…'; btnDisabled = 'disabled'; }
        else if (!canAfford) { btnText = '🔒 Need ' + (cost - balance).toLocaleString() + ' more'; btnDisabled = 'disabled'; }

        return '<div class="' + cardClass + '">'
          + '<div class="build-card-header">'
          + '<span class="build-card-icon">' + (dev.icon || '🏗️') + '</span>'
          + '<div style="flex:1;min-width:0;"><div class="build-card-name"><a href="dev.html?slug=' + dev.slug + '">' + dev.name + ' ↗</a></div>'
          + '<div class="build-card-meta">' + (catLabels[dev.category] || dev.category || '') + ' · ' + dev.build_time_days + ' Lum days</div></div>'
          + '</div>'
          + '<div class="build-card-body">'
          + '<div class="build-card-desc">' + (dev.description || '') + '</div>'
          + '</div>'
          + '<div class="build-card-footer">'
          + '<div class="build-card-cost">' + cost.toLocaleString() + '<span>ARKIS</span></div>'
          + '<button class="' + btnClass + '" ' + btnDisabled
          + ' data-slug="' + dev.slug + '" data-name="' + dev.name.replace(/"/g, '&quot;') + '"'
          + ' data-cost="' + cost + '" data-days="' + dev.build_time_days + '">'
          + btnText + '</button>'
          + '</div>'
          + '</div>';
      }).join('');
    }

    function buildTabs(activeCat) {
      return '<div class="build-cat-tabs">'
        + cats.map(c =>
            '<button class="build-cat-tab' + (c === activeCat ? ' active' : '') + '"'
            + ' onclick="switchBuildCat(\'' + c + '\',this)">'
            + (catLabels[c] || c) + '</button>'
          ).join('')
        + '</div>';
    }

    inner.innerHTML = '<div class="build-balance-bar"><div><div style="font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:rgba(255,255,255,0.3);font-weight:700;margin-bottom:2px;">Your Balance</div><strong>' + balance.toLocaleString() + ' ARKIS</strong></div><span class="build-balance-slots">' + existing.length + ' / 10 slots used</span></div>'
      + buildTabs('all')
      + '<div class="build-cards-grid" id="buildCardsGrid">' + renderCards('all') + '</div>';

    // Tab switch
    window.switchBuildCat = function(cat, btn) {
      document.querySelectorAll('.build-cat-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('buildCardsGrid').innerHTML = renderCards(cat);
      wireBuildCardBtns();
    };

    wireBuildCardBtns();

  } catch(e) {
    console.error('loadBuildCatalog error:', e);
    inner.innerHTML = '<div style="color:rgba(255,80,80,0.6);font-size:13px;">Could not load catalog — please reload.</div>';
  }
}

function wireBuildCardBtns() {
  document.querySelectorAll('.build-card-btn:not([disabled])').forEach(btn => {
    btn.replaceWith(btn.cloneNode(true)); // remove old listeners
  });
  document.querySelectorAll('.build-card-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', function() {
      confirmAndBuild(this.dataset.slug, this.dataset.name, Number(this.dataset.cost), Number(this.dataset.days));
    });
  });
}

async function confirmAndBuild(slug, name, cost, days) {
  const permitFee = Math.round(cost * 0.05);
  const total = cost + permitFee;
  if (!confirm(name + '\n\nCost: ' + cost.toLocaleString() + ' ARKIS + ' + permitFee.toLocaleString() + ' permit fee = ' + total.toLocaleString() + ' ARKIS total\nBuild time: ' + days + ' Lum days (' + days + ' IRL hours)\n\nConfirm construction?')) return;

  const sb = window.supabase || window.supabaseClient;
  const session = (() => { try { return JSON.parse(localStorage.getItem('minalia_session') || '{}'); } catch(e) { return {}; } })();
  const userId = session?.user?.id;
  if (!sb || !userId) return;

  const unitCode = window._uCode;
  const btn = [...document.querySelectorAll('.build-card-btn')].find(b => b.dataset.slug === slug);
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Starting…'; }

  try {
    const { data: result, error } = await sb.rpc('build_development', {
      p_user_id:   userId,
      p_unit_code: unitCode,
      p_slug:      slug
    });

    if (error) {
      const msg = error.message || '';
      if (msg.includes('insufficient_balance')) throw new Error('Insufficient ARKIS — you cannot afford this building.');
      if (msg.includes('not_unit_owner'))        throw new Error('You do not own this unit.');
      if (msg.includes('already_building_or_built')) throw new Error('This building is already built or under construction.');
      if (msg.includes('no_slots_available'))    throw new Error('No development slots remaining on this unit.');
      if (msg.includes('building_not_found'))    throw new Error('Building not found in catalog.');
      throw new Error(msg || 'Build failed — please try again.');
    }

    // Update nav ARKIS display with server-confirmed balance
    const newBalance = Number(result.balance_after);
    if (window.playerTokens) window.playerTokens.arkis = newBalance;
    if (typeof window.refreshNavArkis === 'function') window.refreshNavArkis(newBalance);

    if (btn) { btn.className = 'build-card-btn building'; btn.textContent = '⏳ Building…'; btn.disabled = true; }

  } catch(e) {
    alert('Build failed: ' + (e.message || 'please try again'));
    if (btn) { btn.disabled = false; btn.textContent = '🏗️ Build · ' + cost.toLocaleString() + ' ARKIS'; }
  }
}

// ── PULSE TUNING ──
function tuneThisUnit() {
  const cu = window.currentUser || window._sessionUser || (() => {
    try { return JSON.parse(localStorage.getItem('minalia_session') || '{}').user || null; } catch(e) { return null; }
  })();
  if (!cu?.id) { alert('Connect your wallet first.'); return; }
  const code = (new URLSearchParams(window.location.search).get('code') || '').toUpperCase().trim();
  if (!code) return;
  if (typeof openTuneModal === 'function') {
    openTuneModal(code);
  } else {
    alert('Tune module not loaded yet — please try again.');
  }
}
</script>

<script>document.addEventListener("DOMContentLoaded", function(){

  function tickConstructionTimers() {
    document.querySelectorAll('[data-completedat]').forEach(el => {

      if (msLeft <= 0) {
        el.innerHTML = '<span style="color:rgba(96,255,171,0.9);">✓ Complete — reload page</span>';
        return;
      }
      const lumDur = typeof realMsToLumDuration === 'function' ? realMsToLumDuration(msLeft) : '';
      const irlStr = msLeft < 3600000
        ? `${Math.ceil(msLeft/60000)} IRL min`

      el.innerHTML = `${lumDur} <span style="font-size:10px;color:rgba(255,255,255,0.3);font-weight:400;">(${irlStr})</span>`;
    });

  setInterval(tickConstructionTimers, 30000);

        if (sellerId) {
          const buyerName = cu.username || cu.name || 'A player';
          const alertMsg  = `💰 ${buyerName} has made an offer of ${amt.toLocaleString()} ARKIS for ${window._uCode}.${msg ? ' Message: "' + msg + '"' : ''} Check your alerts to respond.`;
          try {
            await _sb.rpc('insert_minister_alert', {
              p_user_id:    sellerId,
              p_unit_code:  window._uCode,
              p_alert_type: 'offer_received',
              p_message:    alertMsg,
              p_action_url: 'alerts.html'
            });
          } catch(alertErr) { console.warn('Could not send offer alert:', alertErr.message); }
        }
      }
    } catch(e) { console.warn('Offer insert:', e.message); }

    document.getElementById('mm-offer-body').innerHTML = `
      <div class="mmodal-success-icon">📨</div>
      <div class="mmodal-title" style="text-align:center;margin-bottom:8px;">Offer Sent</div>
      <div class="mmodal-success-msg">
        Your offer of <strong>${amt.toLocaleString()} ARKIS</strong> for
        <strong>${window._uCode}</strong> has been sent to ${window._uOwner?.username || 'the owner'}.
        ${msg ? `<br><br><em>"${msg}"</em>` : ''}
        <br><br>You'll be notified when they respond.
      </div>
      <hr style="border:none;border-top:1px solid rgba(255,255,255,0.07);margin:20px 0;">
      <button class="mbtn mbtn-cancel" onclick="mmClose('mm-offer')">Close</button>`;

    // Refresh offer panel to show "You offered X ARKIS"
    loadOfferState(window._uCode, window._dbUnit?.owner_id, false);
  }


  // ── OFFER STATE ─────────────────────────────────────────────────────────
  // Shows current user's pending offer, or owner's incoming offers with accept/decline
  async function loadOfferState(unitCode, ownerId, isOwner) {
    const sb = window.supabaseClient || window.supabase;
    if (!sb || !unitCode) return;

    const sess = (() => { try { return JSON.parse(localStorage.getItem('minalia_session') || '{}'); } catch(e) { return {}; } })();
    const myId = sess?.user?.id;

    if (isOwner) {
      // ── Owner view: show all pending offers with accept/decline ──
      const panel = document.getElementById('ownerOfferPanel');
      if (!panel) return;
      try {
        const { data: offers } = await sb.from('unit_offers')
          .select('id, price, message, offered_at, status, buyer_id, users!unit_offers_buyer_id_fkey(username, avatar, avatar_url)')
          .eq('unit_code', unitCode)
          .eq('status', 'pending')
          .order('price', { ascending: false });

        if (!offers || offers.length === 0) { panel.innerHTML = ''; return; }

        const fmt = n => Number(n).toLocaleString();
        const timeAgo = dt => {
          const d = Math.floor((Date.now() - new Date(dt)) / 1000);
          if (d < 60) return 'just now';
          if (d < 3600) return Math.floor(d/60) + 'm ago';
          if (d < 86400) return Math.floor(d/3600) + 'h ago';
          return Math.floor(d/86400) + 'd ago';
        };

        panel.innerHTML = `
          <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.07);">
            <div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
              color:rgba(255,224,138,0.5);margin-bottom:8px;">📨 ${offers.length} Pending Offer${offers.length>1?'s':''}</div>
            ${offers.map(o => {
              const buyer = o['users!unit_offers_buyer_id_fkey'] || o.users || {};
              return `<div style="padding:10px 12px;border-radius:8px;background:rgba(255,224,138,0.05);
                border:1px solid rgba(255,224,138,0.15);margin-bottom:6px;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;">
                  <div>
                    <span style="font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:700;color:#FFE08A;">
                      ${fmt(o.price)} ARKIS</span>
                    <span style="font-size:10px;color:rgba(255,255,255,0.3);margin-left:8px;">
                      from <a href="profile.html?user=${encodeURIComponent(buyer.username||'')}"
                        style="color:rgba(255,224,138,0.6);text-decoration:none;">${buyer.username||'Unknown'}</a>
                      · ${timeAgo(o.offered_at)}</span>
                  </div>
                </div>
                ${o.message ? `<div style="font-size:11px;color:rgba(255,255,255,0.4);font-style:italic;margin-bottom:8px;">"${o.message}"</div>` : ''}
                <div style="display:flex;gap:6px;">
                  <button onclick="respondOffer('${o.id}','accepted',${o.price},'${buyer.username||''}')"
                    style="flex:1;padding:6px 0;border-radius:6px;border:1px solid rgba(96,255,171,0.4);
                    background:rgba(96,255,171,0.08);color:rgba(96,255,171,0.9);font-size:11px;font-weight:700;
                    cursor:pointer;letter-spacing:.05em;">✓ Accept</button>
                  <button onclick="respondOffer('${o.id}','declined',${o.price},'${buyer.username||''}')"
                    style="flex:1;padding:6px 0;border-radius:6px;border:1px solid rgba(255,100,100,0.3);
                    background:rgba(255,100,100,0.06);color:rgba(255,100,100,0.8);font-size:11px;font-weight:700;
                    cursor:pointer;letter-spacing:.05em;">✕ Decline</button>
                </div>
              </div>`;
            }).join('')}
          </div>`;
      } catch(e) { console.warn('loadOfferState owner:', e.message); }

    } else {
      // ── Buyer view: show my pending offer ──
      const btn = document.getElementById('makeOfferBtn');
      const area = document.getElementById('offerActionArea');
      if (!myId || !btn) return;
      try {
        const { data: myOffer } = await sb.from('unit_offers')
          .select('id, price, status, offered_at, message')
          .eq('unit_code', unitCode)
          .eq('buyer_id', myId)
          .in('status', ['pending','accepted','declined'])
          .order('offered_at', { ascending: false })
          .limit(1)
          .maybeSingle();

        if (!myOffer) return;

        const fmt = n => Number(n).toLocaleString();
        const statusColor = myOffer.status === 'accepted' ? 'rgba(96,255,171,0.9)'
                          : myOffer.status === 'declined' ? 'rgba(255,100,100,0.8)'
                          : 'rgba(255,224,138,0.8)';
        const statusLabel = myOffer.status === 'accepted' ? '✓ Accepted'
                          : myOffer.status === 'declined' ? '✕ Declined'
                          : '⏳ Offer Pending';

        // Replace "Make Offer" button with status pill
        btn.style.display = 'none';
        const existingPill = document.getElementById('myOfferPill');
        if (!existingPill) {
          const pill = document.createElement('div');
          pill.id = 'myOfferPill';
          pill.style.cssText = 'display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;' +
            'background:rgba(255,224,138,0.06);border:1px solid rgba(255,224,138,0.2);margin-top:6px;';
          pill.innerHTML = `<span style="font-size:13px;">📨</span>
            <div>
              <div style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:${statusColor};">
                ${statusLabel}</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.6);">${fmt(myOffer.price)} ARKIS offered</div>
            </div>`;
          if (area) area.appendChild(pill);
        }
      } catch(e) { console.warn('loadOfferState buyer:', e.message); }
    }
  }

  // ── OWNER: respond to offer (accept / decline) ────────────────────────
  async function respondOffer(offerId, response, price, buyerName) {
    const sb = window.supabaseClient || window.supabase;
    const sess = (() => { try { return JSON.parse(localStorage.getItem('minalia_session') || '{}'); } catch(e) { return {}; } })();
    const myId = sess?.user?.id;
    if (!sb || !myId) return;

    const btn = event?.target;
    if (btn) { btn.disabled = true; btn.textContent = response === 'accepted' ? 'Accepting…' : 'Declining…'; }

    try {
      // Update offer status
      const { error } = await sb.from('unit_offers')
        .update({ status: response, responded_at: new Date().toISOString() })
        .eq('id', offerId);
      if (error) throw error;

      if (response === 'accepted') {
        // Get buyer_id for the offer
        const { data: offerRow } = await sb.from('unit_offers')
          .select('buyer_id').eq('id', offerId).single();
        const buyerId = offerRow?.buyer_id;

        // Alert the buyer — accepted
        if (buyerId) {
          await sb.rpc('insert_minister_alert', {
            p_user_id:    buyerId,
            p_unit_code:  window._uCode,
            p_alert_type: 'offer_accepted',
            p_message:    `✅ Your offer of ${Number(price).toLocaleString()} ARKIS for ${window._uCode} has been accepted! Visit the unit to complete the purchase.`,
            p_action_url: `unit.html?code=${window._uCode}`
          });
        }
        // Alert the owner — confirmation
        await sb.rpc('insert_minister_alert', {
          p_user_id:    myId,
          p_unit_code:  window._uCode,
          p_alert_type: 'offer_accepted',
          p_message:    `✅ You accepted ${buyerName}'s offer of ${Number(price).toLocaleString()} ARKIS for ${window._uCode}. Complete the sale via the unit page.`,
          p_action_url: `unit.html?code=${window._uCode}`
        });
      } else {
        // Alert the buyer — declined
        const { data: offerRow } = await sb.from('unit_offers')
          .select('buyer_id').eq('id', offerId).single();
        const buyerId = offerRow?.buyer_id;
        if (buyerId) {
          await sb.rpc('insert_minister_alert', {
            p_user_id:    buyerId,
            p_unit_code:  window._uCode,
            p_alert_type: 'offer_declined',
            p_message:    `Your offer of ${Number(price).toLocaleString()} ARKIS for ${window._uCode} was declined by the owner.`,
            p_action_url: `unit.html?code=${window._uCode}`
          });
        }
      }

      // Refresh offer panel
      loadOfferState(window._uCode, window._dbUnit?.owner_id, true);

    } catch(e) {
      console.warn('respondOffer error:', e.message);
      alert('Failed to respond — please try again.');
      if (btn) { btn.disabled = false; btn.textContent = response === 'accepted' ? '✓ Accept' : '✕ Decline'; }
    }
  }

  // ── BID LIST + ACTION BADGE ────────────────────────────────────
  // Single function handles both the leaderboard (right col) and the
  // bid action badge (left col). One DB query, no separate bid check needed.
  async function loadBidList(unitCode, ownerId) {
    const wrap = document.getElementById('bidListWrap');
    if (!wrap) return;
    try {
      const sb = window.supabaseClient || window.supabase;
      if (!sb) return;

      // ── Resolve current user identity ──
      // Read session once; use wallet_address as the reliable key
      const sess = (() => { try { return JSON.parse(localStorage.getItem('minalia_session') || '{}'); } catch(e) { return {}; } })();
      const sessWallet = sess?.wallet_address || null;

      // isOwner: wallet match is primary (always correct), UUID is fallback
      const isOwner = (sessWallet && window._uOwner?.wallet && sessWallet === window._uOwner.wallet)
                   || (sess?.user?.id && sess.user.id === ownerId);

      // currentUserId: needed to detect own bids in the list
      // Use session user.id directly — it IS the real UUID for all real wallet logins
      // (minaliens uuid = aaaaaaaa-0001-0001-0001-000000000001, confirmed in DB)
      const currentUserId = sess?.user?.id || null;

      // ── Fetch all bids for this unit ──
      const { data: bids } = await sb.from('bids')
        .select('id, bidder_id, amount, status, is_private, message, created_at, users!bids_bidder_id_fkey(username, mina_wallet_address)')
        .eq('unit_code', unitCode)
        .in('status', ['active', 'outbid'])
        .order('amount', { ascending: false });

      // ── Find my bid from the fetched data — no extra DB call needed ──
      // Match by user ID first; if that misses, match by wallet address
      let myBid = null;
      if (bids && bids.length > 0) {
        myBid = bids.find(b => currentUserId && b.bidder_id === currentUserId)
             || (sessWallet ? bids.find(b => {
                  const u = b['users!bids_bidder_id_fkey'] || b.users || {};
                  return u.mina_wallet_address === sessWallet;
                }) : null)
             || null;

      }

      // ── Update action badge in left column ──
      const area = document.getElementById('bidActionArea');
      if (area && !isOwner) {
        const topBid = parseFloat(window._dbUnit?.auction_current_bid || window._dbUnit?.auction_min_bid || 0);
        if (myBid) {
          const myAmt    = parseFloat(myBid.amount);
          const isLeading = myAmt >= topBid && topBid > 0;
          area.innerHTML = `
            <div style="display:flex;flex-direction:column;gap:8px;">
              <div style="display:inline-flex;align-items:center;gap:7px;padding:8px 14px;border-radius:8px;
                background:${isLeading ? 'rgba(96,255,171,0.08)' : 'rgba(255,140,0,0.08)'};
                border:1px solid ${isLeading ? 'rgba(96,255,171,0.25)' : 'rgba(255,140,0,0.3)'};">
                <span style="font-size:14px;">🔨</span>
                <div>
                  <div style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
                    color:${isLeading ? 'rgba(96,255,171,0.7)' : 'rgba(255,140,0,0.9)'};">
                    ${isLeading ? 'Bid Placed · Leading' : '⚠ Outbid'}</div>
                  <div style="font-size:12px;color:rgba(255,255,255,0.7);">
                    ${myAmt.toLocaleString()} ARKIS
                    ${!isLeading ? `<span style="color:rgba(255,255,255,0.35);font-size:10px;"> · top is ${topBid.toLocaleString()}</span>` : ''}
                  </div>
                </div>
              </div>
              ${!isLeading ? `<button class="btn btn-primary" onclick="openBidModal()" style="width:100%;">↑ Raise Bid</button>` : ''}
            </div>`;
        }
        // If no bid found, the default "Place Bid" button already rendered — leave it
      }

      // ── Render bid leaderboard ──
      if (!bids || bids.length === 0) {
        wrap.innerHTML = `<div style="font-size:11px;color:rgba(255,255,255,0.2);padding:4px 0;">No bids yet — be the first.</div>`;
        return;
      }

      const fmt      = n => Number(n).toLocaleString();
      const timeAgo  = dt => {
        const d = Math.floor((Date.now() - new Date(dt)) / 1000);
        if (d < 60) return 'just now';
        if (d < 3600) return Math.floor(d/60) + 'm ago';
        if (d < 86400) return Math.floor(d/3600) + 'h ago';
        return Math.floor(d/86400) + 'd ago';
      };
      const rankLabel = i => i === 0 ? 'Top bid' : i === 1 ? '2nd bid' : i === 2 ? '3rd bid' : `${i+1}th bid`;

      let html = `<div style="font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
        color:rgba(255,255,255,0.25);margin-bottom:10px;">${bids.length} Bid${bids.length !== 1 ? 's' : ''}</div>`;

      bids.forEach((b, i) => {
        const u      = b['users!bids_bidder_id_fkey'] || b.users || {};
        const isAnon = b.is_private && !isOwner;
        const isMine = b === myBid || (currentUserId && b.bidder_id === currentUserId)
                    || (sessWallet && u.mina_wallet_address === sessWallet);

        const nameHtml = isAnon
          ? `<span style="color:rgba(255,255,255,0.3);">🔒 Private</span>`
          : `<a href="profile.html?user=${encodeURIComponent(u.username || '')}"
               style="color:rgba(255,224,138,0.7);text-decoration:none;font-weight:600;">${u.username || 'Unknown'}</a>`;
        const mineTag = isMine ? ` <span style="color:rgba(96,255,171,0.6);font-size:9px;">· you</span>` : '';
        const msgHtml = (b.message && (isOwner || isMine))
          ? `<div style="margin-top:3px;font-style:italic;color:rgba(255,255,255,0.3);font-size:10px;">"${b.message}"</div>` : '';

        const rankColor = i === 0 ? '#FF8C00' : 'rgba(255,255,255,0.25)';
        const amtColor  = i === 0 ? '#FFE08A' : 'rgba(255,255,255,0.4)';
        const rowBg     = i === 0 ? 'rgba(255,140,0,0.07)' : 'rgba(255,255,255,0.02)';
        const rowBdr    = i === 0 ? 'rgba(255,140,0,0.18)' : 'rgba(255,255,255,0.05)';

        html += `<div style="display:flex;align-items:flex-start;gap:8px;padding:8px 10px;
          border-radius:8px;background:${rowBg};border:1px solid ${rowBdr};margin-bottom:4px;">
          <div style="min-width:44px;flex-shrink:0;">
            <div style="font-size:8px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:${rankColor};">${rankLabel(i)}</div>
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:13px;font-weight:700;color:${amtColor};">${fmt(b.amount)} ARKIS</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:2px;">${nameHtml}${mineTag} · ${timeAgo(b.created_at)}${msgHtml}</div>
          </div>
        </div>`;
      });

      wrap.innerHTML = html;
    } catch(e) {
      console.warn('loadBidList error:', e.message);
    }
  }

  function openBidModal() {
    // Hard guard — owner can never bid on their own unit
    const _sessCheck = (() => { try { return JSON.parse(localStorage.getItem('minalia_session') || '{}'); } catch(e) { return {}; } })();
    const _walletCheck = _sessCheck.wallet_address || null;
    if (_walletCheck && window._uOwner?.wallet && _walletCheck === window._uOwner.wallet) {
      alert('You cannot bid on your own auction.');
      return;
    }
    const db      = window._dbUnit;
    const curBid  = parseFloat(db?.auction_current_bid || 0);
    const minBid  = parseFloat(db?.auction_min_bid || 0);
    const floor   = Math.max(curBid, minBid);
    const suggest = floor + Math.max(1, Math.round(floor * 0.05));
    const endStr  = db?.auction_end_time
      ? new Date(db.auction_end_time).toLocaleString(undefined, {dateStyle:'medium',timeStyle:'short'})
      : '—';
    document.getElementById('mm-bid-body').innerHTML = `
      <div class="mmodal-title">Place a Bid</div>
      <div class="mmodal-ref">${window._uCode} · Auction ends ${endStr}</div>
      <div class="mmodal-priceline">
        <span class="mmodal-price">${floor.toLocaleString()}</span>
        <span class="mmodal-pmina">ARKIS ${curBid > 0 ? 'current bid' : 'minimum'}</span>
      </div>
      <div class="mmodal-pnote">Your bid must exceed ${floor.toLocaleString()} ARKIS</div>
      ${_walletHtml()}
      <div class="mmodal-field">
        <label class="mmodal-flabel">Your Bid (ARKIS)</label>
        <input class="mmodal-input" id="bidAmt" type="number" min="${floor + 1}" placeholder="Min ${(floor+1).toLocaleString()}" value="${suggest}" />
        <div class="mmodal-hint">Must exceed ${floor.toLocaleString()} ARKIS · Funds held in escrow until outbid or auction ends</div>
      </div>
      <div class="mmodal-field" style="margin-top:10px;">
        <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:12px;color:rgba(255,255,255,0.6);">
          <input type="checkbox" id="bidPrivate" style="width:16px;height:16px;accent-color:#FFE08A;cursor:pointer;" />
          <span><span style="color:rgba(255,255,255,0.85);font-weight:600;">Private bid</span> — your identity hidden from seller and public list</span>
        </label>
      </div>
      <div class="mmodal-field" style="margin-top:10px;">
        <label class="mmodal-flabel">Message to seller <span style="color:rgba(255,255,255,0.3);font-weight:400;">(optional)</span></label>
        <input class="mmodal-input" id="bidMessage" type="text" maxlength="120" placeholder="e.g. Open to trade offers too" style="font-size:13px;" />
      </div>
      <button class="mbtn mbtn-bid" onclick="_doBid(${floor})">Place Bid</button>
      <button class="mbtn mbtn-cancel" onclick="mmClose('mm-bid')">Cancel</button>
      <div class="mmodal-note">Bids are binding. If outbid, ARKIS is returned automatically.</div>`;
    document.getElementById('mm-bid').classList.add('open');
  }

  async function _doBid(floor) {
    const amt = parseFloat(document.getElementById('bidAmt').value);
    if (!amt || amt <= floor) { alert('Bid must exceed ' + floor.toLocaleString() + ' ARKIS.'); return; }
    const cu = window.currentUser || window._sessionUser || (() => { try { return JSON.parse(localStorage.getItem('minalia_session') || '{}').user || null; } catch(e) { return null; } })();
    if (!cu?.id) { window.location.replace('login.html'); return; }

    // Show loading state
    document.getElementById('mm-bid-body').innerHTML = `
      <div class="mmodal-title">Place a Bid</div>
      <div class="mmodal-ref">${window._uCode}</div>
      <div style="text-align:center;padding:24px 0;color:rgba(255,255,255,0.4);font-size:13px;">Placing bid…</div>`;

    try {
      const res = await fetch('https://vvlgaisfhhjvchequmhh.supabase.co/functions/v1/process-sale', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          action: 'bid',
          unit_code: window._uCode,
          bidder_id: cu.id,
          amount: amt,
          is_private: document.getElementById('bidPrivate') ? document.getElementById('bidPrivate').checked : false,
          message: document.getElementById('bidMessage') ? (document.getElementById('bidMessage').value.trim() || null) : null
        })
      });
      const data = await res.json();

      if (!res.ok || data.error) {
        document.getElementById('mm-bid-body').innerHTML = `
          <div class="mmodal-title">Bid Failed</div>
          <div class="mmodal-ref">${window._uCode}</div>
          <div style="color:rgba(255,100,100,0.9);font-size:13px;margin:16px 0;line-height:1.6;">${data.error || 'Something went wrong.'}</div>
          <button class="mbtn mbtn-cancel" onclick="mmClose('mm-bid')">Close</button>`;
        return;
      }

      document.getElementById('mm-bid-body').innerHTML = `
        <div class="mmodal-success-icon">🔨</div>
        <div class="mmodal-title" style="text-align:center;margin-bottom:8px;">Bid Placed!</div>
        <div class="mmodal-success-msg">
          Your bid of <strong>${amt.toLocaleString()} ARKIS</strong> on
          <strong>${window._uCode}</strong> is now the highest bid.<br><br>
          Your ARKIS has been held in escrow. You'll be notified if outbid.
        </div>
        <hr style="border:none;border-top:1px solid rgba(255,255,255,0.07);margin:20px 0;">
        <button class="mbtn mbtn-cancel" onclick="mmClose('mm-bid');render()">Close</button>`;

      // Immediately refresh the bid list and price display without waiting for modal close
      if (window._dbUnit) {
        window._dbUnit.auction_current_bid = amt;
        const priceEl = document.querySelector('.market-price-big');
        const noteEl  = document.querySelector('.market-price-note');
        if (priceEl) priceEl.textContent = amt.toLocaleString();
        if (noteEl)  noteEl.textContent  = noteEl.textContent.replace('Minimum bid','Current bid');
      }
      loadBidList(window._uCode, window._dbUnit?.owner_id);

      // Send alerts — bidder confirmation + owner notification + outbid notification
      try {
        const sb = window.supabaseClient || window.supabase;
        if (sb) {
          // Find previous top bidder (to notify them they've been outbid)
          const { data: prevBids } = await sb.from('bids')
            .select('bidder_id, amount')
            .eq('unit_code', window._uCode)
            .eq('status', 'active')
            .neq('bidder_id', cu.id)
            .order('amount', { ascending: false })
            .limit(1);
          const prevTopBidder = prevBids?.[0];

          // Alert for bidder (own confirmation)
          await sb.rpc('insert_minister_alert', {
            p_user_id:    cu.id,
            p_unit_code:  window._uCode,
            p_alert_type: 'financial',
            p_message:    `Your bid of ${amt.toLocaleString()} ARKIS on ${window._uCode} is now the leading bid. Funds are held in escrow until the auction closes or you are outbid.`,
            p_action_url: `unit.html?code=${window._uCode}`,
            p_share_text: `I just placed a bid on ${window._uCode} on @Minaliens! play.minaliens.xyz #Minalia #Mina`
          });
          // Alert for unit owner
          if (window._uOwner?.id && window._uOwner.id !== cu.id) {
            await sb.rpc('insert_minister_alert', {
              p_user_id:    window._uOwner.id,
              p_unit_code:  window._uCode,
              p_alert_type: 'financial',
              p_message:    `New bid on your auction for ${window._uCode} — ${amt.toLocaleString()} ARKIS. View the auction to track all bids.`,
              p_action_url: `unit.html?code=${window._uCode}`,
              p_share_text: null
            });
          }
          // Alert previous top bidder that they've been outbid
          if (prevTopBidder?.bidder_id && prevTopBidder.bidder_id !== cu.id) {
            await sb.rpc('insert_minister_alert', {
              p_user_id:    prevTopBidder.bidder_id,
              p_unit_code:  window._uCode,
              p_alert_type: 'financial',
              p_message:    `You've been outbid on ${window._uCode}. Your bid of ${Number(prevTopBidder.amount).toLocaleString()} ARKIS has been overtaken by a bid of ${amt.toLocaleString()} ARKIS. Raise your bid to stay in the auction.`,
              p_action_url: `unit.html?code=${window._uCode}`,
              p_share_text: null
            });
          }
        }
      } catch(alertErr) { console.warn('Alert error:', alertErr.message); }

    } catch(e) {
      document.getElementById('mm-bid-body').innerHTML = `
        <div class="mmodal-title">Error</div>
        <div style="color:rgba(255,100,100,0.9);font-size:13px;margin:16px 0;">${e.message}</div>
        <button class="mbtn mbtn-cancel" onclick="mmClose('mm-bid')">Close</button>`;
    }
  }
  </script>

  <script>
    window.onTuneCommit = function(unitCode, score) {
      const btn     = document.getElementById('btnTuneUnit');
      const status  = document.getElementById('tuneStatus');
      const battery = document.getElementById('tuneBatteryDisplay');
      if (!btn || !status) return;

      // Status message based on numeric score
      let msg, col;
      if (score >= 100)     { msg = '✦ Perfect! +24h bonus'; col = '#4ade80'; }
      else if (score >= 75) { msg = '◈ Near! +8h bonus';     col = '#a3e635'; }
      else if (score >= 50) { msg = '◇ Close +2h bonus';     col = '#FFE08A'; }
      else                  { msg = '✗ Missed';               col = '#f87171'; }

      btn.textContent = '✓ Tuned';
      status.textContent = msg;
      status.style.color = col;

      // Update battery visual live
      if (battery) {
        const fc = score >= 80 ? 'bat-fill-green' : score >= 50 ? 'bat-fill-yellow' : score >= 25 ? 'bat-fill-orange' : 'bat-fill-red';
        const tc = score >= 80 ? '#4ade80'        : score >= 50 ? '#FFE08A'         : score >= 25 ? '#fb923c'         : '#f87171';
        const label = score >= 80 ? 'TUNED' : score >= 50 ? 'ACTIVE' : score >= 25 ? 'WEAK' : 'LOW';
        battery.style.display = 'flex';
        battery.innerHTML = `<div class="tune-battery-bar"><div class="tune-battery-fill ${fc}" style="width:${score}%"></div></div>
          <div class="tune-battery-meta"><span>⚡ TUNE POWER</span><span style="color:${tc};font-weight:700;">${label} · ${score}%</span></div>`;
      }

      setTimeout(() => {
        btn.disabled = false;
        btn.textContent = '⚡ Tune Pulse';
        status.textContent = '';
      }, 5000);
    };
  </script>

  <!-- ── DEV SLOT POPUP ── -->
  <div class="dev-slot-popup" id="devSlotPopup">
    <span class="dsp-icon" id="dspIcon"></span>
    <div class="dsp-name" id="dspName"></div>
    <div class="dsp-cat"  id="dspCat"></div>
    <div class="dsp-status" id="dspStatus"></div>
    <div class="dsp-hint"  id="dspHint"></div>
  </div>

  <script>
  // ── Dev slot popup ──────────────────────────────────────────
  const DEV_CAT_COLORS_UNIT = {
    housing:'#ffe08a', economy:'#60ffab', science:'#60c8ff',
    nature:'#64dc82',  culture:'#c8a0ff', health:'#ff8c8c', prestige:'#ffc850',
    defence:'#ff6b6b',
  };
  const DEV_CAT_LABELS_UNIT = {
    housing:'Housing', economy:'Economy', science:'Science',
    nature:'Nature',   culture:'Culture', health:'Health',  prestige:'Prestige',
    defence:'Defence',
  };

  function showDevSlotPopup(e, idx) {
    const devs = window._unitDevs || [];
    const dev  = devs[idx];
    if (!dev) return;

    const cat       = dev.development_catalog?.category || 'housing';
    const col       = DEV_CAT_COLORS_UNIT[cat] || '#fff';
    const catLabel  = DEV_CAT_LABELS_UNIT[cat] || cat;
    const name      = dev.development_catalog?.name || dev.building_name || 'Development';
    const icon      = dev.development_catalog?.icon || '🏗️';
    const isBuilding = dev.status === 'building';

    const popup = document.getElementById('devSlotPopup');
    document.getElementById('dspIcon').textContent = icon;
    document.getElementById('dspName').textContent = name;
    document.getElementById('dspCat').textContent  = catLabel;
    document.getElementById('dspCat').style.color  = col;

    const statusEl = document.getElementById('dspStatus');
    statusEl.textContent = isBuilding ? '⚙ Under Construction' : '✓ Fully Operational';
    statusEl.className   = 'dsp-status ' + (isBuilding ? 'building' : 'completed');
    popup.className      = 'dev-slot-popup ' + (isBuilding ? 'building' : 'completed') + '-popup';

    document.getElementById('dspHint').textContent = 'See developments panel below for full details';

    // Position above the clicked slot
    const r  = e.target.getBoundingClientRect();
    const pw = 260;
    let left = r.left + r.width / 2 - pw / 2;
    let top  = r.top + window.scrollY - 150;
    if (left + pw > window.innerWidth - 8) left = window.innerWidth - pw - 8;
    if (left < 8) left = 8;
    if (top < window.scrollY + 8) top = r.bottom + window.scrollY + 8;

    popup.style.left = left + 'px';
    popup.style.top  = top + 'px';
    popup.classList.add('visible');
    e.stopPropagation();
  }

  function scrollToDevPanel() {
    const panel = document.getElementById('devPanel');
    if (panel) panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Close popup on outside click
  document.addEventListener('click', () => {
    const p = document.getElementById('devSlotPopup');
    if (p) p.classList.remove('visible');
  });
  </script>
