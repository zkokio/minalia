      align-items: start;

      background: rgba(25,20,35,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
    }
    .nft-media-wrap {
      width: 100%;
      border-radius: 10px;
      background: rgba(255,255,255,0.04);
      margin-bottom: 14px;
      position: relative;
    }
    .nft-image {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 10px;
    }
    .nft-meta {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 10px;
    }
    .nft-token {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: rgba(255,255,255,0.35);
    }
    .rarity-badge {
      font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px;
      letter-spacing: 0.04em;
    }
    .stars-row {
      font-size: 14px; letter-spacing: 2px;
      margin-top: 6px;
    }

    /* ── Nav buttons ── */
    .all-ministers-btn {
      display: block; text-align: center;
      padding: 9px 14px; border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55);
      font-size: 12px; font-weight: 600;
      text-decoration: none; letter-spacing: 0.02em;
      transition: all 0.2s;
    }
    .all-ministers-btn:hover {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.85);
    }
    .minister-nav {
      display: flex; gap: 8px;
    }
    .minister-nav-btn {
      flex: 1; padding: 9px 12px;
      border-radius: 8px; text-align: center;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.55);
      font-size: 12px; font-weight: 600;
      text-decoration: none; transition: all 0.2s;
    }
    .minister-nav-btn:hover {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.85);
    }
    .minister-nav-btn.disabled {
      opacity: 0.3; pointer-events: none;
    }

    /* ── Consult panel ── */
    .consult-panel {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px; padding: 18px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .consult-title {
      font-family: 'Orbitron', monospace;
      font-size: 10px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .consult-desc {
      font-size: 12px; color: rgba(255,255,255,0.4);
      line-height: 1.5;
    }
    .consult-btn {
      padding: 10px 16px; border-radius: 8px;
      background: rgba(255,224,138,0.1);
      border: 1px solid rgba(255,224,138,0.25);
      color: rgba(255,224,138,0.9);
      font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      letter-spacing: 0.03em;
    }
    .consult-btn:hover {
      background: rgba(255,224,138,0.18);
      border-color: rgba(255,224,138,0.4);
    }
    .back-btn {
      display: block; text-align: center;
      font-size: 11px; color: rgba(255,255,255,0.3);
      text-decoration: none; transition: color 0.2s;
    }
    .back-btn:hover { color: rgba(255,255,255,0.6); }

    /* ── Right column ── */
    .minister-right { display: flex; flex-direction: column; gap: 12px; }

    /* ── Hero panel ── */
    .minister-hero {
      background: rgba(25,20,35,0.9);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 24px;
    }

    .minister-hero-inner {
      display: grid;
      grid-template-columns: 1fr 240px;
      gap: 24px;
      align-items: start;
    }

      border-left: 1px solid rgba(255,255,255,0.07);
      padding-left: 24px;
    }

      font-family: 'Orbitron', monospace;

      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 12px;
    }

      letter-spacing: 0.06em; text-decoration: none;
      transition: opacity 0.2s;

      letter-spacing: -0.01em; line-height: 1;
      margin-bottom: 14px;

    .minister-bio {
      font-size: 13px; color: rgba(255,255,255,0.55);
      line-height: 1.7; margin-bottom: 20px;

      gap: 10px; margin-bottom: 16px;

      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px; padding: 10px 12px;

    .detail-label {
      font-size: 9px; text-transform: uppercase;
      letter-spacing: .09em; color: rgba(255,255,255,0.3);
      font-weight: 700; margin-bottom: 4px;

      font-size: 13px; color: rgba(255,255,255,0.75);

    .superpower-value {
      font-size: 13px; font-weight: 600;
    }

      padding: 8px 16px; border-radius: 8px;
      border: 1px solid; margin-bottom: 20px;

      letter-spacing: .1em; color: rgba(255,255,255,0.4);

      font-size: 12px; color: rgba(255,255,255,0.3);
      font-style: italic;

      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px; overflow: hidden;
    }

      justify-content: space-between;
      padding: 14px 18px; cursor: pointer;

      font-size: 11px; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,0.6);

      font-size: 10px; color: rgba(255,255,255,0.3);
      transition: transform 0.25s;

      overflow: hidden;
      padding: 0 18px 16px;
      transition: all 0.25s;

    .breadcrumb span { color: rgba(255,255,255,0.85); }

  async function loadTerritoryOwners() {
    const grid  = document.getElementById('ownersGrid');
    const count = document.getElementById('ownersCount');
    if (!grid || !count || !M) return;

    const cu = window.currentUser || window._sessionUser;

    // Wait for supabase
    let db = null;
    for (let i = 0; i < 50; i++) {
      if (window.supabase && typeof window.supabase.from === 'function') { db = window.supabase; break; }
      if (window.supabaseClient && typeof window.supabaseClient.from === 'function') { db = window.supabaseClient; break; }
      await new Promise(r => setTimeout(r, 100));
    }

    let dbOwners = [];
    if (db) {
      try {
        const { data: units } = await db
          .from('units')
          .select('owner_id')
          .like('unit_code', M.area + '-%')
          .not('owner_id', 'is', null);

        if (units && units.length) {
          const ownerIds = [...new Set(units.map(u => u.owner_id))];
          const { data: users } = await db
            .from('users')
            .select('id, username, avatar_url, avatar, x_username')
            .in('id', ownerIds);
          if (users) dbOwners = users;
        }
      } catch(e) { console.warn('DB query failed:', e.message); }
    }

    const seen = new Set();
    const allOwners = [
      ...dbOwners.map(u => {
        const av = resolveAvatar(u.avatar || u.avatar_url || null, u.x_username, u.username);        return { username: u.username, avatar: av };
      })
    ].filter(o => {
      if (seen.has(o.username)) return false;
      seen.add(o.username);
      return true;
    });

    count.textContent = allOwners.length + ' owner' + (allOwners.length !== 1 ? 's' : '');

    if (!allOwners.length) {
      grid.innerHTML = `<div class="owners-empty">No units claimed yet — <a href="map.html?highlight=${M.area}" style="color:#4ade80;text-decoration:none">be the first!</a></div>`;
      return;
    }

    grid.innerHTML = allOwners.map(owner => {
      const isSelf = cu && cu.username === owner.username;
      const profileUrl = isSelf
        ? 'profile.html'
        : 'profile.html?user=' + encodeURIComponent(owner.username);
      const initials = (owner.username || '?').substring(0,2).toUpperCase();
      const imgHtml = owner.avatar
        ? `<img src="${owner.avatar}" alt="${owner.username}" onerror="this.style.display=&quot;none&quot;;this.nextElementSibling.style.display=&quot;flex&quot;;" style="width:44px;height:44px;object-fit:cover;object-position:center top;display:block;">`
        : '';
      const fallbackHtml = `<span style="display:${owner.avatar ? 'none' : 'flex'};width:44px;height:44px;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#FFE08A;">${initials}</span>`;
      return `<a href="${profileUrl}" title="${owner.username}" style="display:flex;flex-direction:column;align-items:center;gap:5px;text-decoration:none;flex-shrink:0;">
        <div style="width:44px;height:44px;border-radius:7px;overflow:hidden;border:1px solid rgba(255,255,255,0.15);background:#151020;flex-shrink:0;">
          ${imgHtml}${fallbackHtml}
        </div>
        <span style="font-size:10px;font-weight:600;color:rgba(255,255,255,0.55);max-width:52px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${owner.username}</span>
        ${isSelf ? '<span style="font-size:9px;color:#60FFAB;font-weight:700;">You</span>' : ''}
      </a>`;
    }).join('');
  }

        .like('unit_code', M.area + '-%')

      const heldCnt      = (units     || []).length;

      function fmt(n) {
        if (n >= 1000000) return (n/1000000).toFixed(2) + 'M';
        if (n >= 1000)    return (n/1000).toFixed(1) + 'K';
        return n.toLocaleString();
      }

      const balEl = document.getElementById('treasury-balance');
      balEl.textContent = bal.toLocaleString() + ' ARKIS';
      balEl.style.color = M.color;

      if (plasmEl)  plasmEl.textContent  = fmtTok(trow?.plasm_balance);
      if (wireEl)   wireEl.textContent   = fmtTok(trow?.wire_balance);
      if (lichenEl) lichenEl.textContent = fmtTok(trow?.lichen_balance);
      if (sporeEl)  sporeEl.textContent  = fmtTok(trow?.spore_balance);

      document.getElementById('treasury-tax-week').textContent  = weekInc  > 0 ? '+' + fmt(weekInc)  : '—';
      document.getElementById('treasury-tax-total').textContent = totalInc > 0 ? '+' + fmt(totalInc) : '—';
      document.getElementById('treasury-units').textContent     = heldCnt + ' / 16';

      const demolishEl = document.getElementById('treasury-demolish-total');
      if (demolishEl) demolishEl.textContent = totalDemolish > 0 ? '−' + fmt(totalDemolish) : '—';

      document.getElementById('treasury-loading').style.display = 'none';
      document.getElementById('treasury-content').style.display = '';
    } catch(e) {
      console.warn('Treasury load failed:', e.message);
      document.getElementById('treasury-loading').textContent = 'Treasury unavailable.';
    }
  }

  function consultMinister() {
    if (!M) return;
    alert(`Minister ${M.name} consultation coming soon!\n\nPersonalised guidance for ${M.area} — ${M.territory}.`);
  }

  // ── Lum clock (inline) ──
  const LUM_EPOCH_MS = 1738368000000;
  const LUM_SEASONS = [
    {name:'The Kindling',symbol:'🔥',color:'#FF6B35',startDay:1,endDay:73},
    {name:'The Bloom',   symbol:'🌿',color:'#60FFab',startDay:74,endDay:146},
    {name:'The Drift',   symbol:'💨',color:'#50B0FF',startDay:147,endDay:219},
    {name:'The Freeze',  symbol:'❄️', color:'#B0E0FF',startDay:220,endDay:292},
    {name:'The Surge',   symbol:'⚡',color:'#FFE08A',startDay:293,endDay:365},
  ];
  function _lumTime() {
    const ms = Date.now() - LUM_EPOCH_MS;
    const lumMins = Math.floor(ms / (3600000 / 1440));
    const minute = lumMins % 60, hour = Math.floor(lumMins / 60) % 24;
    const dayTotal = Math.floor(lumMins / 1440), year = Math.floor(dayTotal / 365) + 1;
    const dayOfYear = (dayTotal % 365) + 1;
    const season = LUM_SEASONS.find(s => dayOfYear >= s.startDay && dayOfYear <= s.endDay) || LUM_SEASONS[0];
    return { year, month: Math.min(12, Math.ceil(dayOfYear / 30.417)), dayOfYear, hour, minute, season };
  }
  function _updateClock() {
    const t = _lumTime();
    const te = document.getElementById('ticker-clock');
    const bx = document.getElementById('ticker-clock-box');
    if (te) te.textContent = `YEAR ${t.year} · MONTH ${t.month} · DAY ${t.dayOfYear} · ${String(t.hour).padStart(2,'0')}:${String(t.minute).padStart(2,'0')}`;
    if (bx) { bx.style.borderLeftColor = t.season.color; bx.title = `${t.season.name} · Year ${t.year}`; }
  }
  _updateClock();
  setInterval(_updateClock, 1000);
  </script>

<script>
// Minalien intro video — play once then show static image
(function() {
  const params = new URLSearchParams(window.location.search);
  const id = (params.get('id') || '').toLowerCase();
  if (!id) return;

  const video = document.getElementById('nftIntroVideo');
  const img   = document.getElementById('nftStaticImg');
  if (!video || !img) return;

  const src = `videos/${id}.mp4`;

  // Probe whether the video file exists
  fetch(src, { method: 'HEAD' })
    .then(r => {
      if (!r.ok) throw new Error('no video');
      // Video exists — show it, hide image
      video.src = src;
      video.style.display = 'block';
      img.style.display   = 'none';
      video.play().catch(() => {});
      // When it ends, swap back to image
      video.addEventListener('ended', () => {
        // Seek to last frame and freeze — no swap needed
        video.currentTime = video.duration - 0.001;
      }, { once: true });
    })
    .catch(() => {
      // No video for this minalien — just show the image (already visible)
    });
})();
</script>
